    git commit -m "docs: runbooks updated with replay + thresholds" || true

# ──────────────────────────────────────────────────────────────────────────────
# 6) DB ASSERTIONS — OPTIONAL (SKIP IF NO DATABASE_URL)
# ──────────────────────────────────────────────────────────────────────────────
- id: db-assertions
  desc: "Script to assert FK/CASCADE and CHECK constraints in live DB"
  run: |
    mkdir -p scripts
    cat > scripts/db-assert.ts <<'TS'
import pg from 'pg';
const url=process.env.DATABASE_URL; if(!url){ console.log('skip: no DATABASE_URL'); process.exit(0); }
const client=new pg.Client({ connectionString:url }); await client.connect();
async function hasCheck(table:string){ const q=`select conname from pg_constraint c join pg_class t on c.conrelid=t.oid where t.relname=$1 and contype='c'`; const r=await client.query(q,[table]); return r.rows.map(x=>x.conname); }
async function hasFkCascade(table:string){ const q=`select confupdtype, confdeltype from pg_constraint where conrelid=$1::regclass and contype='f'`; const r=await client.query(q,[table]); return r.rows.some(x=>x.confdeltype==='c'); }
const tables=['agent_suggestions','policy_evaluations','loops','feedback','post_accept_outcomes','quarantine_events'];
for(const t of tables){
  const fkc=await hasFkCascade(t); if(!fkc) throw new Error(`FK CASCADE missing on ${t}`);
}
console.log('✅ FK CASCADE present');
const checks=await hasCheck('agent_suggestions'); if(!checks.length) throw new Error('CHECKs missing on agent_suggestions');
console.log('✅ CHECK constraints present');
await client.end();
TS
