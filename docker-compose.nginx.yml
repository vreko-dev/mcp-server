# Docker Compose override for Nginx load balancer
# Use with: docker-compose -f docker-compose.yml -f docker-compose.nginx.yml up -d

services:
    # Nginx Load Balancer
    nginx:
        image: nginx:alpine
        container_name: snapback-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_HTTP_PORT:-80}:80"
            - "${NGINX_HTTPS_PORT:-443}:443"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_cache:/var/cache/nginx
            - nginx_logs:/var/log/nginx
        networks:
            - app-network
        depends_on:
            web:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost/api/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        security_opt:
            - no-new-privileges:true
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: "0.2"
                reservations:
                    memory: 64M
                    cpus: "0.1"

    # Remove direct port mapping from web service when using nginx
    web:
        ports: [] # Override to remove direct port exposure

volumes:
    nginx_cache:
        driver: local
    nginx_logs:
        driver: local
