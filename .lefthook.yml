# Lefthook configuration for SnapBack Site
# Three-tier validation approach (Industry-standard performance):
# 1. Pre-commit (<5s): Lint and type check only staged files
# 2. Pre-push (15-30s): Lint, typecheck, and unit tests for AFFECTED packages only
# 3. CI (5-15min): Comprehensive validation including integration tests with PostgreSQL

commit-msg:
    commands:
        commitlint:
            run: npx commitlint --edit {1}

pre-commit:
    parallel: true
    commands:
        # Lockfile sync - runs first to ensure pnpm-lock.yaml stays in sync
        lockfile-sync:
            priority: 1
            glob: "**/package.json"
            run: |
                CHANGED_PACKAGES=$(git diff --cached --name-only | grep -E 'package\.json$' || true)
                if [ -n "$CHANGED_PACKAGES" ]; then
                  echo "📦 Package.json changed, updating lockfile..."
                  pnpm install --lockfile-only --ignore-scripts

                  if ! git diff --quiet pnpm-lock.yaml; then
                    echo "✅ Lockfile updated and staged"
                    git add pnpm-lock.yaml
                  else
                    echo "✅ Lockfile already in sync"
                  fi
                fi

        # Temporarily disabled: ESLint not configured in monorepo (using Biome)
        # no-unsafe-regex:
        #     glob: "packages/core/src/detection/**/*.ts"
        #     run: pnpm exec eslint {staged_files} --rule 'no-unsafe-regex:error'
        no-framer-motion:
            glob: "*.{ts,tsx,js,jsx}"
            run: |
                FRAMER_MOTION_USAGE=$(git diff --cached --name-only -G "framer-motion" --diff-filter=AM | xargs grep -l "framer-motion" 2>/dev/null || true)
                if [ -n "$FRAMER_MOTION_USAGE" ]; then
                  echo "❌ framer-motion detected in staged files:"
                  echo "$FRAMER_MOTION_USAGE"
                  echo ""
                  echo "⚠️  framer-motion is deprecated. Use 'motion/react' instead."
                  echo "   See: https://motion.dev/guides/migrate-from-framer-motion"
                  echo ""
                  echo "To skip this check: git commit --no-verify"
                  exit 1
                fi
        check-framer-motion-deps:
            glob: "package.json"
            run: pnpm run check-framer-motion
        biome-fix:
            run: pnpm -w biome check --write --unsafe --staged --files-ignore-unknown=true --no-errors-on-unmatched
        typecheck-scoped:
            run: pnpm -w turbo run type-check --filter=...[HEAD] --filter="!@snapback/api-service"
        lint-scoped:
            run: pnpm -w turbo run lint --filter=...[HEAD]
        # test-scoped:
        #     run: pnpm -w turbo run test --filter=...[HEAD] -- --run
        todo-scan:
            run: |
                # Check if rg (ripgrep) is available
                if command -v rg &> /dev/null; then
                    bash -lc 'rg -nE "(TODO|FIXME)" --glob "!**/node_modules/**" --glob "!**/CHANGELOG*" || true; ! rg -qE "(TODO|FIXME)" --glob "!**/node_modules/**" --glob "!**/CHANGELOG*"'
                else
                    echo "Warning: ripgrep (rg) not found, skipping TODO/FIXME scan"
                    echo "To install ripgrep: brew install ripgrep (macOS) or apt-get install ripgrep (Linux)"
                fi
            fail_text: "TODO/FIXME found — please resolve or suppress"
        # Security: Check for API keys and secrets
        check-secrets:
            tags: [security]
            run: |
                # Check for common secret patterns in staged files
                # Exclude .snapback directories and test files
                STAGED_FILES=$(git diff --cached --name-only | grep -v "\.snapback/" | grep -v "\.test\." | grep -v "\.spec\." | grep -v "/test/" | grep -v "__tests__")
                if [ -n "$STAGED_FILES" ]; then
                  SECRETS=$(echo "$STAGED_FILES" | xargs grep -E "(sk-[a-zA-Z0-9]{32,}|pk_(live|test)_[a-zA-Z0-9]{24,}|AKIA[A-Z0-9]{16}|AIza[a-zA-Z0-9_-]{35}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})" 2>/dev/null || true)

                  if [ -n "$SECRETS" ]; then
                    echo "❌ Potential API key/secret detected!"
                    echo ""
                    echo "$SECRETS"
                    echo ""
                    echo "🔒 Security issue: Remove secrets from code and use environment variables."
                    echo "   Common patterns: sk-xxx (OpenAI), pk_live/pk_test (Stripe), AKIA (AWS), AIza (Google), ghp/gho (GitHub)"
                    echo ""
                    echo "To skip this check: git commit --no-verify"
                    exit 1
                  fi
                fi

pre-push:
    parallel: true
    commands:
        # Type check only affected packages (10x faster than checking all)
        # Note: Excludes web package (has 320+ pre-existing type errors)
        # Note: Excludes api-service package (has architectural type errors requiring larger refactor)
        type-check-affected:
            run: pnpm turbo type-check --filter="[HEAD^]..." --filter="!@snapback/web" --filter="!@snapback/api-service"

        # Run unit tests on affected packages (catch bugs before CI)
        # Note: Only runs if packages have "test" script in package.json
        test-affected:
            run: pnpm turbo test --filter=[HEAD^] || true

        # Lint affected packages
        lint-affected:
            run: pnpm turbo lint --filter=[HEAD^]

        # Format check for affected files
        format-affected:
            run: pnpm exec biome check --changed --since=HEAD^ --files-ignore-unknown=true --no-errors-on-unmatched

        # Check package versions to ensure catalog usage
        # TODO: Fix syncpack crash - temporarily disabled
        # check-package-versions:
        #     tags: [dependencies]
        #     run: pnpm check:mismatches

        # API-First Boundary Guard: Prevent direct DB access in apps/web
        # Enforces architectural boundary between web and database layers
        api-boundary-guard:
            tags: [architecture, api-first]
            run: bash scripts/check-api-boundary.sh

        # MCP Server: Build smoke tests (fast validation)
        # Catches: missing dependencies, TypeScript errors, module resolution
        mcp-server-smoke:
            tags: [smoke, mcp]
            glob: "apps/mcp-server/**/*.{ts,json}"
            run: |
                # Only run if MCP server files changed
                MCP_FILES=$(git diff --cached --name-only | grep "^apps/mcp-server/" | grep -v "\.test\." | grep -v "\.spec\." | grep -v "/test/" | grep -v "__tests__" || true)
                if [ -n "$MCP_FILES" ]; then
                  echo "🔍 Running MCP server smoke tests..."
                  pnpm --filter @snapback/mcp-server test test/smoke --run
                fi

        # MCP Server: Storage E2E tests (real persistence validation)
        # Catches: mock storage, broken FileSystemStorage, event bus failures
        mcp-server-e2e:
            tags: [e2e, mcp]
            glob: "apps/mcp-server/**/*.{ts,json}"
            run: |
                # Only run if MCP server files changed
                MCP_FILES=$(git diff --cached --name-only | grep "^apps/mcp-server/" | grep -v "\.test\." | grep -v "\.spec\." | grep -v "/test/" | grep -v "__tests__" || true)
                if [ -n "$MCP_FILES" ]; then
                  echo "🧪 Running MCP server E2E tests..."
                  pnpm --filter @snapback/mcp-server test test/e2e --run
                fi

        # VS Code Extension: Security dependency check
        # Catches: high-risk packages, CVEs, license issues, deprecated packages
        vscode-security-check:
            tags: [security, vscode]
            glob: "apps/vscode/package.json"
            run: |
                VSCODE_FILES=$(git diff --cached --name-only | grep "^apps/vscode/package.json" || true)
                if [ -n "$VSCODE_FILES" ]; then
                  echo "🔒 Running VS Code extension security checks..."
                  pnpm --filter snapback-vscode run security:check-deps
                fi

        # Guardian Detection Engine: Pattern detection tests (key differentiator)
        # Catches: Secret detection, mock leakage, phantom dependency issues
        # Runs comprehensive test suite including performance benchmarks
        detect-patterns:
            tags: [detection, guardian, quality]
            glob: "packages/core/src/detection/**/*.ts"
            run: |
                DETECTION_FILES=$(git diff --cached --name-only | grep "^packages/core/src/detection/" || true)
                if [ -n "$DETECTION_FILES" ]; then
                  echo "🔍 Running Guardian detection engine tests..."
                  pnpm run test -- "packages/core/test/detection/**/*.test.ts" --run
                fi
