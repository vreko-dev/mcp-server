# Local Development Docker Compose for SnapBack
# Minimal setup: Just Node + build tools for better-sqlite3 development
# Use this for native CLI/SDK development with better-sqlite3
#
# Usage:
#   docker-compose -f docker-compose.dev-local.yml run --rm dev bash
#   # Inside container:
#   pnpm install
#   pnpm snapback:check-sqlite
#   pnpm test
#   pnpm type-check

version: "3.8"

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev-local
    container_name: snapback-dev
    stdin_open: true
    tty: true
    volumes:
      # Mount entire workspace with caching
      - .:/workspace:cached
      # Don't mount node_modules to avoid conflicts
      - /workspace/node_modules
      - /workspace/.pnpm-store
    working_dir: /workspace
    environment:
      NODE_ENV: development
      # Ensure pnpm uses the right store
      PNPM_HOME: /workspace/.pnpm-store
      npm_config_store_dir: /workspace/.pnpm-store

volumes:
  pnpm-store:
