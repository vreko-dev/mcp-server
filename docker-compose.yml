# Production Docker Compose Configuration
# Includes web application, API service, PostgreSQL database, and Redis cache

services:
    # ===== DATABASE =====
    postgres:
        image: postgres:16-alpine
        container_name: snapback-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-snapback}
            POSTGRES_USER: ${POSTGRES_USER:-snapback}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            PGDATA: /var/lib/postgresql/data/pgdata
            # Memory optimization for production
            POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=512MB -c maintenance_work_mem=64MB -c work_mem=16MB -c max_connections=100"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        networks:
            - app-network
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-snapback} -d ${POSTGRES_DB:-snapback}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        security_opt:
            - no-new-privileges:true
        tmpfs:
            - /tmp
            - /var/run/postgresql
        deploy:
            resources:
                limits:
                    memory: 1024M
                    cpus: "1"
                reservations:
                    memory: 512M
                    cpus: "0.5"

    # ===== DATABASE MIGRATIONS =====
    migrations:
        image: postgres:16-alpine
        container_name: snapback-migrations-prod
        environment:
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER:-snapback}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB:-snapback}
        volumes:
            - ./packages/platform/drizzle/migrations:/migrations:ro
            - ./ops/scripts/run-migrations.sh:/run-migrations.sh:ro
        command: sh /run-migrations.sh
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app-network
        restart: "no"

    # ===== REDIS CACHE =====
    redis:
        image: redis:7-alpine
        container_name: snapback-redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - app-network
        ports:
            - "${REDIS_PORT:-6379}:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 10s
        security_opt:
            - no-new-privileges:true
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M

    # ===== API SERVICE =====
    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
            target: runner
        container_name: snapback-api
        restart: unless-stopped
        environment:
            NODE_ENV: production
            PORT: 3001
            # Database
            DATABASE_URL: postgresql://${POSTGRES_USER:-snapback}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-snapback}
            # Redis (if used)
            REDIS_URL: redis://redis:6379
            # Auth secrets
            BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
            BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://api:3001}
            # External services (pass through from host env)
            GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
            GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
            RESEND_API_KEY: ${RESEND_API_KEY}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            # S3 Storage
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
            S3_BUCKET_NAME: ${S3_BUCKET_NAME}
            S3_REGION: ${S3_REGION}
            # Payments
            STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
            STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
            STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
        ports:
            - "${API_PORT:-3001}:3001"
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
            migrations:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:3001/api/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        security_opt:
            - no-new-privileges:true
        tmpfs:
            - /tmp:noexec,nosuid,size=100m
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: "0.5"
                reservations:
                    memory: 256M
                    cpus: "0.25"

    # ===== WEB APPLICATION =====
    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: runner
        container_name: snapback-web
        restart: unless-stopped
        environment:
            NODE_ENV: production
            PORT: 3000
            # Database
            DATABASE_URL: postgresql://${POSTGRES_USER:-snapback}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-snapback}
            # Redis (if used)
            REDIS_URL: redis://redis:6379
            # Auth secrets
            BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
            BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://api:3001}
            # API service URL
            NEXT_PUBLIC_API_URL: http://api:3001
            # External services (pass through from host env)
            GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
            GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
            RESEND_API_KEY: ${RESEND_API_KEY}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            # S3 Storage
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
            S3_BUCKET_NAME: ${S3_BUCKET_NAME}
            S3_REGION: ${S3_REGION}
            # Payments
            STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
            STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
            STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
        ports:
            - "${WEB_PORT:-3000}:3000"
        networks:
            - app-network
        depends_on:
            api:
                condition: service_healthy
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:3000/api/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        security_opt:
            - no-new-privileges:true
        tmpfs:
            - /tmp:noexec,nosuid,size=100m
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: "0.5"
                reservations:
                    memory: 256M
                    cpus: "0.25"

    # ===== MCP SERVER (Model Context Protocol) =====
    mcp-server:
        build:
            context: .
            dockerfile: apps/mcp-server/Dockerfile
        container_name: snapback-mcp
        restart: unless-stopped
        environment:
            NODE_ENV: production
            PORT: 3002
            # Database
            DATABASE_URL: postgresql://${POSTGRES_USER:-snapback}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-snapback}
            # Auth
            BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
            BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://api:3001}
            NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        ports:
            - "${MCP_PORT:-3002}:3002"
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy
            api:
                condition: service_healthy
        security_opt:
            - no-new-privileges:true
        tmpfs:
            - /tmp:noexec,nosuid,size=100m
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: "0.5"
                reservations:
                    memory: 256M
                    cpus: "0.25"

networks:
    app-network:
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/16

volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local
