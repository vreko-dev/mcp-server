# Area Labels
"area: vscode":
  - changed-files:
      - any-glob-to-any-file:
          - apps/vscode/**/*

"area: web":
  - changed-files:
      - any-glob-to-any-file:
          - apps/web/**/*

"area: api":
  - changed-files:
      - any-glob-to-any-file:
          - apps/api/**/*

"area: auth":
  - changed-files:
      - any-glob-to-any-file:
          - packages/auth/**/*

"area: mcp":
  - changed-files:
      - any-glob-to-any-file:
          - apps/mcp-server/**/*
          - ai_dev_utils/mcp/**/*

"area: cli":
  - changed-files:
      - any-glob-to-any-file:
          - apps/cli/**/*

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - docs/**/*
          - apps/docs/**/*

# Type Labels
test:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.ts"
          - "**/*.spec.ts"
          - "**/test/**/*"
          - "**/__tests__/**/*"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.json"
          - "**/*.yml"
          - "**/*.yaml"
          - "**/tsconfig.json"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**/*
          - .github/actions/**/*

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "**/Dockerfile*"
          - docker/**/*
          - docker-compose*.yml
