import { describe, it, expect } from 'vitest';
class MockDb{ inserts=0; async insert(){ await new Promise(r=>setTimeout(r,3)); this.inserts++; return { ok:true }; } }
describe('Telemetry concurrency', ()=>{
  it('handles multiple concurrent inserts', async ()=>{
    const db=new MockDb(); const sink:any={ db, table:{}, tableName:'telemetry', logger:{ warn(){} } };
    sink.ingest = async (event:any)=> db.insert();
    const events=Array.from({length:20},(_,i)=>({i}));
    const res=await Promise.all(events.map(e=>sink.ingest(e)));
    expect(res.every(Boolean)).toBe(true); expect(db.inserts).toBe(20);
  });
});
