name: Turborepo CI

on:
    push:
        branches: [main, develop, feat/**]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

# Automatically cancel previous runs on the same branch
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: "20"
    PNPM_VERSION: "9"
    TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
    # Job 1: Install and setup
    setup:
        name: Setup
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Required for Turborepo change detection

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Cache Turborepo
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      **/node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

    # Job 2: Lint all packages
    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: setup
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      **/node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

            - name: Restore Turborepo cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Lint packages
              run: pnpm turbo run lint --filter='@snapback/*'

    # Job 3: Type check all packages
    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        needs: setup
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      **/node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

            - name: Restore Turborepo cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Type check packages
              run: pnpm turbo run typecheck --filter='@snapback/*'

    # Job 4: Test all packages
    test:
        name: Test
        runs-on: ubuntu-latest
        needs: setup
        timeout-minutes: 15

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: snapback_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      **/node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

            - name: Restore Turborepo cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Setup test database
              run: |
                  export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/snapback_test"
                  pnpm --filter @snapback/database run push

            - name: Test packages
              run: pnpm turbo run test --filter='@snapback/*'
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/snapback_test
                  NODE_ENV: test
                  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY }}
                  STRIPE_WEBHOOK_SECRET: whsec_test_123
                  STRIPE_SOLO_MONTHLY_PRICE_ID: price_test_solo
                  STRIPE_TEAM_MONTHLY_PRICE_ID: price_test_team
                  STRIPE_ENTERPRISE_MONTHLY_PRICE_ID: price_test_enterprise

            - name: Generate coverage
              if: always()
              run: pnpm turbo run test:coverage --filter='@snapback/*'
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/snapback_test
                  NODE_ENV: test
                  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY }}
                  STRIPE_WEBHOOK_SECRET: whsec_test_123
                  STRIPE_SOLO_MONTHLY_PRICE_ID: price_test_solo
                  STRIPE_TEAM_MONTHLY_PRICE_ID: price_test_team
                  STRIPE_ENTERPRISE_MONTHLY_PRICE_ID: price_test_enterprise

            - name: Upload coverage reports
              if: always()
              uses: codecov/codecov-action@v4
              with:
                  directory: ./packages/**/coverage
                  flags: turborepo
                  name: Turborepo Coverage
                  fail_ci_if_error: true
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    # Job 5: Build all packages
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, typecheck, test]
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v4
              with:
                  path: |
                      node_modules
                      **/node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

            - name: Restore Turborepo cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Build packages
              run: pnpm turbo run build --filter='@snapback/*'

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: turborepo-builds
                  path: |
                      packages/*/dist
                      apps/*/dist
                      apps/*/.next
                  retention-days: 7

    # Job 6: Matrix testing for critical packages
    test-matrix:
        name: Test Matrix - Node ${{ matrix.node }}
        runs-on: ${{ matrix.os }}
        needs: setup
        timeout-minutes: 15

        strategy:
            fail-fast: false
            matrix:
                node: ["18", "20", "22"]
                os: [ubuntu-latest]
                include:
                    # Add macOS for SDK package
                    - node: "20"
                      os: macos-latest
                    # Add Windows for SDK package
                    - node: "20"
                      os: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-${{ matrix.node }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-${{ matrix.node }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Test SDK package
              run: pnpm --filter @snapback/sdk test

    # Job 7: Security audit
    security:
        name: Security Audit
        runs-on: ubuntu-latest
        needs: setup
        timeout-minutes: 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Run security audit
              run: pnpm audit --audit-level=high
              continue-on-error: true

    # Job 8: Status check (required for branch protection)
    ci-status:
        name: CI Status
        runs-on: ubuntu-latest
        needs: [lint, typecheck, test, build, test-matrix]
        if: always()

        steps:
            - name: Check all jobs status
              run: |
                  if [ "${{ needs.lint.result }}" != "success" ] || \
                     [ "${{ needs.typecheck.result }}" != "success" ] || \
                     [ "${{ needs.test.result }}" != "success" ] || \
                     [ "${{ needs.build.result }}" != "success" ] || \
                     [ "${{ needs.test-matrix.result }}" != "success" ]; then
                    echo "❌ CI checks failed"
                    exit 1
                  fi
                  echo "✅ All CI checks passed"
