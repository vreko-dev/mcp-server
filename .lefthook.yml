pre-commit:
    parallel: true
    commands:
        config-drift-detect:
            priority: 1
            run: node tooling/scripts/config-drift-check.mjs --warn-only
            skip:
                - merge
                - rebase

        quality:
            glob: "**/*.{ts,tsx,js,jsx,json}"
            run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
            stage_fixed: true
            skip:
                - merge
                - rebase

        tsup-config-validator:
            glob: "**/tsup.config.ts"
            run: node tooling/scripts/validate-tsup-config.mjs {staged_files}
            skip:
                - merge
                - rebase

        tsconfig-path-validator:
            glob: "**/tsconfig.json"
            run: node tooling/scripts/validate-tsconfig-paths.mjs {staged_files}
            skip:
                - merge
                - rebase

        relative-import-detector:
            glob: "**/src/**/*.{ts,tsx}"
            run: node tooling/scripts/validate-relative-imports.mjs {staged_files}
            skip:
                - merge
                - rebase

        workspace-deps-validation:
            glob: "**/package.json"
            run: node tooling/scripts/validate-workspace-deps.mjs {staged_files}
            skip:
                - merge
                - rebase

        tailwind-v4-config-check:
            glob: "**/tailwind.config.{ts,js,mjs,cjs}"
            run: |
                echo '⚠️  Tailwind v4 uses CSS-first configuration via @theme in globals.css'
                echo '❌ tailwind.config.ts files should not exist in Tailwind v4 projects'
                echo 'Remove the config file and migrate to @theme block in CSS'
                exit 1
            skip:
                - merge
                - rebase

        catalog-deps-validator:
            glob: "**/package.json"
            run: node tooling/scripts/validate-catalog-deps.mjs {staged_files}
            skip:
                - merge
                - rebase

pre-push:
    parallel: false
    commands:
        test-suite-validation:
            glob: "**/*.test.ts"
            run: |
                echo '🧪 Running core test suite validation...'
                cd apps/vscode && pnpm vitest run test/unit/detection test/unit/restore test/unit/domain/snapshotOrchestrator.test.ts --reporter=verbose
                if [ $? -ne 0 ]; then
                  echo '❌ Test suite validation failed'
                  exit 1
                fi
                cd ../.. && pnpm --filter=@snapback/mcp-server vitest run test/unit/tools
                if [ $? -ne 0 ]; then
                  echo '❌ MCP test suite validation failed'
                  exit 1
                fi
                echo '✅ All core tests validated successfully'
            skip:
                - merge
                - rebase

        type-check-full:
            glob: "**/*.{ts,tsx}"
            run: |
                # Get list of changed packages
                CHANGED_PACKAGES=$(git diff --name-only HEAD@{1} HEAD | grep -E '^(apps|packages)/' | cut -d'/' -f1,2 | sort -u | tr '\n' ',' | sed 's/,$//')

                if [ -z "$CHANGED_PACKAGES" ]; then
                  echo '✅ No package changes to type-check'
                  exit 0
                fi

                echo "🔍 Type-checking changed packages: $CHANGED_PACKAGES"
                # Run type-check only for changed packages
                for pkg in $(echo $CHANGED_PACKAGES | tr ',' ' '); do
                  if [ -f "$pkg/package.json" ]; then
                    PKG_NAME=$(node -p "require('./$pkg/package.json').name" 2>/dev/null || echo "")
                    if [ -n "$PKG_NAME" ]; then
                      echo "  Checking $PKG_NAME..."
                      pnpm --filter="$PKG_NAME" type-check 2>&1 || exit 1
                    fi
                  fi
                done
            skip:
                - merge
                - rebase

        dts-build-validation:
            run: |
                echo '🔍 Validating DTS builds for migrated packages...'
                node - << 'EOF'
                const { spawnSync } = require('child_process');
                const fs = require('fs');
                const path = require('path');

                // Packages that have dts.resolve: true
                const dtsResolvePkgs = [
                  'packages/testing',
                  'packages/events',
                  'packages/config',
                  'packages/sdk',
                  'packages/infrastructure'
                ];

                let failures = [];

                dtsResolvePkgs.forEach(pkg => {
                  const tsconfigPath = path.join(pkg, 'tsconfig.json');
                  if (!fs.existsSync(tsconfigPath)) return;

                  console.log(`  Checking ${pkg} DTS generation...`);
                  const result = spawnSync('pnpm', ['--filter', path.basename(pkg), 'build'], {
                    cwd: process.cwd(),
                    stdio: 'pipe',
                    timeout: 60000
                  });

                  if (result.status !== 0) {
                    failures.push(`${pkg} build failed`);
                  }
                });

                if (failures.length > 0) {
                  console.error(`\n❌ DTS validation failed:\n`);
                  failures.forEach(f => console.error(`  - ${f}`));
                  process.exit(1);
                }
                console.log('\n✅ All DTS builds validated');
                process.exit(0);
                EOF
            skip:
                - merge
                - rebase

        no-placeholder-tests:
            glob: "**/*.test.ts"
            run: |
                echo '🔍 Checking for placeholder assertions...'
                if grep -l 'expect(true).toBe(true)' {staged_files} 2>/dev/null; then
                  echo '❌ Placeholder test detected. Implement real assertions.'
                  exit 1
                fi
                echo '✅ No placeholder assertions found'

        no-skipped-tests:
            glob: "**/*.test.ts"
            run: |
                echo '⚠️  Checking for skipped tests...'
                if grep -l 'it.skip\|describe.skip\|test.skip' {staged_files} 2>/dev/null; then
                  echo '⚠️  Skipped test detected. Add unblock criteria in comment or implement.'
                fi

        no-todo-tests:
            glob: "**/*.test.ts"
            stage_fixed: true
            run: |
                echo '🔍 Checking for TODO markers in tests...'
                if grep -l '// TODO:' {staged_files} 2>/dev/null; then
                  echo '⚠️  TODO marker found. Consider moving to __deferred__/ if test is blocked.'
                fi

commit-msg:
    commands:
        test-commit-format:
            run: |
                echo '📝 Validating commit message format...'
                if grep -qE '(WIP|TODO|FIXME|XXX|HACK)' <<< "$1"; then
                  echo '⚠️  Commit message contains work-in-progress marker'
                fi
                echo '✅ Commit message format OK'

post-checkout:
    commands:
        install-deps:
            run: |
                if git diff HEAD@{1} HEAD --name-only | grep -q pnpm-lock.yaml; then
                  echo '📦 pnpm-lock.yaml changed, installing dependencies...'
                  pnpm install --frozen-lockfile
                fi

        build-workspace-deps:
            run: |
                # Check if any workspace package source files changed
                if git diff HEAD@{1} HEAD --name-only | grep -qE '^packages/(sdk|contracts|infrastructure|events|config|core)/src/'; then
                  echo '🔨 Workspace package sources changed, rebuilding dependencies...'
                  pnpm build:oss
                fi

post-merge:
    commands:
        install-deps:
            run: |
                if git diff HEAD@{1} HEAD --name-only | grep -q pnpm-lock.yaml; then
                  echo '📦 pnpm-lock.yaml merged, installing dependencies...'
                  pnpm install --frozen-lockfile
                fi

        build-workspace-deps:
            run: |
                # Check if any workspace package source files changed
                if git diff HEAD@{1} HEAD --name-only | grep -qE '^packages/(sdk|contracts|infrastructure|events|config|core)/src/'; then
                  echo '🔨 Workspace package sources changed, rebuilding dependencies...'
                  pnpm build:oss
                fi
