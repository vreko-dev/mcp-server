name: "SnapBack • CR-V2 Refactor — Updated Runlist (with feedback deltas)"
labels: ["tool:qoder","platform","analytics","drizzle","gdpr","observability","tests","docs","ci"]
assumptions:
  - "Monorepo: packages/platform + packages/analytics"
  - "DB: PostgreSQL + Drizzle ORM (code-first with migrations)"
  - "Node ≥ 18, pnpm ≥ 8"
  - "DATABASE_URL available in CI for DB assertions (job will skip if absent)"
env:
  SHELL: bash
  BASH_ENV: "set -euo pipefail"

tasks:

# ──────────────────────────────────────────────────────────────────────────────
# 0) PREFLIGHT
# ──────────────────────────────────────────────────────────────────────────────
- id: branch
  desc: "Create/checkout working branch"
  run: |
    git checkout -b refactor/cr-v2-updates 2>/dev/null || git checkout refactor/cr-v2-updates

- id: deps
  desc: "Install helper toolchain (idempotent)"
  run: |
    pnpm -w add -D tsx vitest @vitest/coverage-v8 @types/node zod
    # drizzle-kit if you use it; harmless if already present
    pnpm -w add -D drizzle-kit

# ──────────────────────────────────────────────────────────────────────────────
# 1) SCHEMA HARDENING — FK CASCADE, ENUM CHECKS, INDEXES, QUARANTINE ALIGNMENT
# ──────────────────────────────────────────────────────────────────────────────
- id: schema-imports
  desc: "Normalize schema import paths to ../postgres"
  run: |
    node - <<'NODE'
const fs=require('fs'),path=require('path');const dir='packages/platform/src/db/schema/snapback';
if(!fs.existsSync(dir))process.exit(0);
for(const f of fs.readdirSync(dir).filter(x=>x.endsWith('.ts'))){
  const p=path.join(dir,f); let s=fs.readFileSync(p,'utf8'); const b=s;
  s=s.replace(/from\s+["']\.\.\/\.\.\/postgres["']/g,"from '../postgres'");
  if(s!==b){fs.writeFileSync(p,s); console.log('patched',p);}
}
NODE
    git add packages/platform/src/db/schema/snapback/*.ts
    git commit -m "db(schema): normalize postgres import paths" || true

- id: schema-fk-cascade
  desc: "Enforce FK → users.id and apiKeys.id with ON DELETE CASCADE"
  run: |
    node - <<'NODE'
const fs=require('fs'),path=require('path');
const dir='packages/platform/src/db/schema/snapback';
const targets=['agent-suggestions.ts','post-accept-outcomes.ts','policy-evaluations.ts','loops.ts','feedback.ts'];
for(const f of targets){
  const p=path.join(dir,f); if(!fs.existsSync(p)) continue; let s=fs.readFileSync(p,'utf8'); let ch=false;
  // userId
  s=s.replace(/(userId:\s*[^\n]+)(\))?(\s*,)?/m, m=>/references\(/.test(m)?m:(ch=true, m.replace(/,$/,'')+`.references(()=>users.id,{ onDelete:'cascade' }),`));
  // apiKeyId
  s=s.replace(/(apiKeyId:\s*[^\n]+)(\))?(\s*,)?/m, m=>/references\(/.test(m)?m:(ch=true, m.replace(/,$/,'')+`.references(()=>apiKeys.id,{ onDelete:'cascade' }),`));
  if(ch){fs.writeFileSync(p,s); console.log('fk cascade applied',p);}
}
NODE
    git add packages/platform/src/db/schema/snapback/*.ts
    git commit -m "db(schema): FK CASCADE userId/apiKeyId" || true

- id: schema-enum-checks
  desc: "Add CHECK constraints for enum fields (idempotent insert)"
  run: |
    node - <<'NODE'
const fs=require('fs'),path=require('path');
const dir='packages/platform/src/db/schema/snapback';
const checks=[
  {f:'agent-suggestions.ts', key:'suggestionType', name:'agent_suggestions_suggestion_type_check', vals:['code','comment','refactor']},
  {f:'policy-evaluations.ts', key:'evaluationResult', name:'policy_evaluations_result_check', vals:['pass','fail','warn']},
  {f:'loops.ts', key:'loopType', name:'loops_loop_type_check', vals:['generation','refinement','validation']},
  {f:'feedback.ts', key:'feedbackType', name:'feedback_type_check', vals:['suggestion','feature','bug','general']},
];
function up(p,c){let s=fs.readFileSync(p,'utf8'); if(s.includes(c.name)) return false;
  if(!/\(t\)\s*=>\s*\(\{/.test(s)) s=s.replace(/pgTable\(([^,]+),\s*\{([\s\S]*?)\}\s*\)/m,(m,a,b)=>`pgTable(${a}, {${b}}, (t)=>({}))`);
  const vals=c.vals.map(v=>`'${v}'`).join(', ');
  s=s.replace(/\(t\)\s*=>\s*\(\{/, (m)=>`${m}  ${c.name}: check('${c.name}', sql\`\${t.${c.key}} in (${vals})\`),\n  `);
  fs.writeFileSync(p,s); return true;}
for(const c of checks){const p=path.join(dir,c.f); if(fs.existsSync(p)&&up(p,c)) console.log('added CHECK',p);}
NODE
    git add packages/platform/src/db/schema/snapback/*.ts
    git commit -m "db(schema): enum CHECK constraints" || true

