name: Test Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-quality:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for placeholder assertions
        run: |
          echo "🔍 Checking for placeholder assertions..."
          PLACEHOLDER_COUNT=$(grep -r "expect(true).toBe(true)" --include="*.test.ts" --include="*.spec.ts" . || echo "0")
          if [ ! -z "$PLACEHOLDER_COUNT" ]; then
            echo "❌ Placeholder tests detected!"
            echo "$PLACEHOLDER_COUNT"
            exit 1
          fi
          echo "✅ No placeholder assertions found"

      - name: Check skip count
        run: |
          echo "🔍 Checking for excessive test skips..."
          SKIP_COUNT=$(grep -r "it.skip\|describe.skip\|test.skip" --include="*.test.ts" --include="*.spec.ts" . | wc -l)
          echo "Found $SKIP_COUNT skipped tests (max allowed: 10)"
          if [ "$SKIP_COUNT" -gt 10 ]; then
            echo "❌ Too many skipped tests ($SKIP_COUNT). Max allowed: 10"
            exit 1
          fi
          echo "✅ Skip count within limits"

      - name: Check for TODO tests in main
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔍 Checking for TODO markers in tests (main branch only)..."
          TODO_COUNT=$(grep -r "// TODO:" --include="*.test.ts" --include="*.spec.ts" . | wc -l)
          if [ "$TODO_COUNT" -gt 0 ]; then
            echo "❌ TODO markers in tests not allowed on main ($TODO_COUNT found)"
            echo "Please move these tests to __deferred__/ or implement them."
            exit 1
          fi
          echo "✅ No TODO markers in tests"

      - name: Run linter
        run: pnpm lint
        continue-on-error: true

      - name: Run tests
        run: pnpm test
        env:
          CI: true

      - name: Generate coverage report
        run: pnpm test:coverage
        continue-on-error: true

      - name: Check test coverage thresholds
        run: |
          echo "📊 Checking test coverage..."
          # P0 tests should have 95% coverage
          # P1 tests should have 90% coverage
          # P2 tests should have 85% coverage
          # This is a placeholder for actual coverage checking
          # To be integrated with coverage tooling
          echo "⚠️ Coverage check: Configured but not enforced (awaiting coverage tooling integration)"

      - name: Report test results
        if: github.event_name == 'pull_request'
        run: echo 'Test results available in workflow summary'
        continue-on-error: true
