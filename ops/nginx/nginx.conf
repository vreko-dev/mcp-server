# Nginx reverse proxy for SnapBack development (subdomain routing)
#
# Note: Upstream servers use internal Docker network ports:
#   - web:3000, docs:3000 → external 4000, 4001 (mapped by docker-compose)
#   - api:8080 → external 8080
# Nginx listens on port 80, handling subdomain routing internally.
#
# Note: MCP server is now a library in packages/mcp, used by the CLI.

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Timeouts
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    # Buffer sizes
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Upstream definitions
    upstream web {
        server web:3000;
    }

    upstream docs {
        server docs:3000;
    }

    upstream api {
        server api:8080;
    }

    # ===== docs.snapback.dev =====
    server {
        listen 80;
        server_name docs.snapback.dev;

        location / {
            proxy_pass http://docs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Hot reload WebSocket
        location /_next/webpack-hmr {
            proxy_pass http://docs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ===== api.snapback.dev =====
    server {
        listen 80;
        server_name api.snapback.dev;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ===== console.snapback.dev + snapback.dev =====
    server {
        listen 80;
        server_name snapback.dev console.snapback.dev www.snapback.dev;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Hot reload WebSocket
        location /_next/webpack-hmr {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
