openapi: 3.0.0
info:
    title: "SnapBack Telemetry API"
    version: 1.0.0
    description: "API specification for SnapBack telemetry events"
servers:
    - 
        url: "https://api.snapback.dev"
        description: "Production server"
components:
    schemas:
        SaveAttemptEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408254
                    example: 1620000000000
                event:
                    type: string
                    enum:             - save_attempt
                properties:
                    type: object
                    properties:
                        protection:
                            type: string
                            enum:
                                - watch
                                - warn
                                - block
                            description: "Protection level applied to the file"
                        severity:
                            type: string
                            enum:
                                - low
                                - medium
                                - high
                                - critical
                            description: "Severity of the risk detected"
                        file_kind:
                            type: string
                            description: "Type of file being protected"
                            example: typescript
                        reason:
                            type: string
                            description: "Reason for the save attempt"
                            example: "User tried to save a file with a secret"
                        ai_present:
                            type: boolean
                            description: "Whether AI was involved in the decision"
                        ai_burst:
                            type: boolean
                            description: "Whether this was part of an AI burst operation"
                        outcome:
                            type: string
                            enum:
                                - saved
                                - canceled
                                - blocked
                            description: "Outcome of the save attempt"
                    required:
                        - protection
                        - severity
                        - file_kind
                        - reason
                        - ai_present
                        - ai_burst
                        - outcome
            required:
                - event
                - properties
        SnapshotCreatedEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408263
                    example: 1620000000000
                event:
                    type: string
                    enum:             - snapshot_created
                properties:
                    type: object
                    properties:
                        session_id:
                            type: string
                            description: "Unique identifier for the session"
                            example: sess_12345
                        snapshot_id:
                            type: string
                            description: "Unique identifier for the snapshot"
                            example: snap_67890
                        bytes_original:
                            type: number
                            description: "Original size of the file in bytes"
                            example: 1024
                        bytes_stored:
                            type: number
                            description: "Size of the stored snapshot in bytes"
                            example: 512
                        dedup_hit:
                            type: boolean
                            description: "Whether deduplication was applied"
                        latency_ms:
                            type: number
                            description: "Time taken to create the snapshot in milliseconds"
                            example: 45
                    required:
                        - session_id
                        - snapshot_id
                        - bytes_original
                        - bytes_stored
                        - dedup_hit
                        - latency_ms
            required:
                - event
                - properties
        SessionFinalizedEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408263
                    example: 1620000000000
                event:
                    type: string
                    enum:             - session_finalized
                properties:
                    type: object
                    properties:
                        session_id:
                            type: string
                            description: "Unique identifier for the session"
                            example: sess_12345
                        files:
                            type: array
                            items:                 type: string
                            description: "List of files in the session"
                            example:
                                - src/index.ts
                                - package.json
                        triggers:
                            type: array
                            items:                 type: string
                            description: "List of triggers that activated during the session"
                            example:
                                - save_attempt
                                - risk_detected
                        duration_ms:
                            type: number
                            description: "Duration of the session in milliseconds"
                            example: 120000
                        ai_present:
                            type: boolean
                            description: "Whether AI was involved in the session"
                        ai_burst:
                            type: boolean
                            description: "Whether this was part of an AI burst operation"
                        highest_severity:
                            type: string
                            enum:
                                - low
                                - medium
                                - high
                                - critical
                            description: "Highest severity of issues in the session"
                    required:
                        - session_id
                        - files
                        - triggers
                        - duration_ms
                        - ai_present
                        - ai_burst
                        - highest_severity
            required:
                - event
                - properties
        IssueCreatedEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408264
                    example: 1620000000000
                event:
                    type: string
                    enum:             - issue_created
                properties:
                    type: object
                    properties:
                        issue_id:
                            type: string
                            description: "Unique identifier for the issue"
                            example: issue_12345
                        session_id:
                            type: string
                            description: "Unique identifier for the session"
                            example: sess_12345
                        file_kind:
                            type: string
                            description: "Type of file where the issue was detected"
                            example: typescript
                        type:
                            type: string
                            enum:
                                - secret
                                - mock
                                - phantom
                            description: "Type of issue detected"
                        severity:
                            type: string
                            enum:
                                - low
                                - medium
                                - high
                                - critical
                            description: "Severity of the issue"
                        recommendation:
                            type: string
                            description: "Recommendation for resolving the issue"
                            example: "Remove the secret from the file"
                    required:
                        - issue_id
                        - session_id
                        - file_kind
                        - type
                        - severity
                        - recommendation
            required:
                - event
                - properties
        IssueResolvedEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408264
                    example: 1620000000000
                event:
                    type: string
                    enum:             - issue_resolved
                properties:
                    type: object
                    properties:
                        issue_id:
                            type: string
                            description: "Unique identifier for the issue"
                            example: issue_12345
                        resolution:
                            type: string
                            enum:
                                - fixed
                                - ignored
                                - allowlisted
                            description: "How the issue was resolved"
                    required:
                        - issue_id
                        - resolution
            required:
                - event
                - properties
        SessionRestoredEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408265
                    example: 1620000000000
                event:
                    type: string
                    enum:             - session_restored
                properties:
                    type: object
                    properties:
                        session_id:
                            type: string
                            description: "Unique identifier for the session"
                            example: sess_12345
                        files_restored:
                            type: array
                            items:                 type: string
                            description: "List of files that were restored"
                            example:
                                - src/index.ts
                                - package.json
                        time_to_restore_ms:
                            type: number
                            description: "Time taken to restore the session in milliseconds"
                            example: 2500
                        reason:
                            type: string
                            description: "Reason for the session restoration"
                            example: "User requested rollback"
                    required:
                        - session_id
                        - files_restored
                        - time_to_restore_ms
                        - reason
            required:
                - event
                - properties
        PolicyChangedEvent:
            type: object
            properties:
                event_version:
                    type: string
                    default: 1.0.0
                    example: 1.0.0
                timestamp:
                    type: number
                    default: 1762276408265
                    example: 1620000000000
                event:
                    type: string
                    enum:             - policy_changed
                properties:
                    type: object
                    properties:
                        pattern:
                            type: string
                            description: "File pattern that the policy applies to"
                            example: *.env
                        from:
                            type: string
                            enum:
                                - watch
                                - warn
                                - block
                                - unprotected
                            description: "Previous protection level"
                        to:
                            type: string
                            enum:
                                - watch
                                - warn
                                - block
                                - unprotected
                            description: "New protection level"
                        source:
                            type: string
                            description: "Source of the policy change"
                            example: dashboard
                    required:
                        - pattern
                        - from
                        - to
                        - source
            required:
                - event
                - properties
    parameters: {}
paths:
    /telemetry:
        post:
            summary: "Send telemetry event"
            description: "Endpoint for sending telemetry events to the SnapBack system"
            requestBody:
                description: "Telemetry event data"
                content:
                    application/json:
                        schema:
                            anyOf:
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/SaveAttemptEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408273
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - save_attempt
                                                properties:
                                                    type: object
                                                    properties:
                                                        protection:
                                                            type: string
                                                            enum:
                                                                - watch
                                                                - warn
                                                                - block
                                                            description: "Protection level applied to the file"
                                                        severity:
                                                            type: string
                                                            enum:
                                                                - low
                                                                - medium
                                                                - high
                                                                - critical
                                                            description: "Severity of the risk detected"
                                                        file_kind:
                                                            type: string
                                                            description: "Type of file being protected"
                                                            example: typescript
                                                        reason:
                                                            type: string
                                                            description: "Reason for the save attempt"
                                                            example: "User tried to save a file with a secret"
                                                        ai_present:
                                                            type: boolean
                                                            description: "Whether AI was involved in the decision"
                                                        ai_burst:
                                                            type: boolean
                                                            description: "Whether this was part of an AI burst operation"
                                                        outcome:
                                                            type: string
                                                            enum:
                                                                - saved
                                                                - canceled
                                                                - blocked
                                                            description: "Outcome of the save attempt"
                                                    required:
                                                        - protection
                                                        - severity
                                                        - file_kind
                                                        - reason
                                                        - ai_present
                                                        - ai_burst
                                                        - outcome
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/SnapshotCreatedEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408273
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - snapshot_created
                                                properties:
                                                    type: object
                                                    properties:
                                                        session_id:
                                                            type: string
                                                            description: "Unique identifier for the session"
                                                            example: sess_12345
                                                        snapshot_id:
                                                            type: string
                                                            description: "Unique identifier for the snapshot"
                                                            example: snap_67890
                                                        bytes_original:
                                                            type: number
                                                            description: "Original size of the file in bytes"
                                                            example: 1024
                                                        bytes_stored:
                                                            type: number
                                                            description: "Size of the stored snapshot in bytes"
                                                            example: 512
                                                        dedup_hit:
                                                            type: boolean
                                                            description: "Whether deduplication was applied"
                                                        latency_ms:
                                                            type: number
                                                            description: "Time taken to create the snapshot in milliseconds"
                                                            example: 45
                                                    required:
                                                        - session_id
                                                        - snapshot_id
                                                        - bytes_original
                                                        - bytes_stored
                                                        - dedup_hit
                                                        - latency_ms
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/SessionFinalizedEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408288
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - session_finalized
                                                properties:
                                                    type: object
                                                    properties:
                                                        session_id:
                                                            type: string
                                                            description: "Unique identifier for the session"
                                                            example: sess_12345
                                                        files:
                                                            type: array
                                                            items:                                 type: string
                                                            description: "List of files in the session"
                                                            example:
                                                                - src/index.ts
                                                                - package.json
                                                        triggers:
                                                            type: array
                                                            items:                                 type: string
                                                            description: "List of triggers that activated during the session"
                                                            example:
                                                                - save_attempt
                                                                - risk_detected
                                                        duration_ms:
                                                            type: number
                                                            description: "Duration of the session in milliseconds"
                                                            example: 120000
                                                        ai_present:
                                                            type: boolean
                                                            description: "Whether AI was involved in the session"
                                                        ai_burst:
                                                            type: boolean
                                                            description: "Whether this was part of an AI burst operation"
                                                        highest_severity:
                                                            type: string
                                                            enum:
                                                                - low
                                                                - medium
                                                                - high
                                                                - critical
                                                            description: "Highest severity of issues in the session"
                                                    required:
                                                        - session_id
                                                        - files
                                                        - triggers
                                                        - duration_ms
                                                        - ai_present
                                                        - ai_burst
                                                        - highest_severity
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/IssueCreatedEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408289
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - issue_created
                                                properties:
                                                    type: object
                                                    properties:
                                                        issue_id:
                                                            type: string
                                                            description: "Unique identifier for the issue"
                                                            example: issue_12345
                                                        session_id:
                                                            type: string
                                                            description: "Unique identifier for the session"
                                                            example: sess_12345
                                                        file_kind:
                                                            type: string
                                                            description: "Type of file where the issue was detected"
                                                            example: typescript
                                                        type:
                                                            type: string
                                                            enum:
                                                                - secret
                                                                - mock
                                                                - phantom
                                                            description: "Type of issue detected"
                                                        severity:
                                                            type: string
                                                            enum:
                                                                - low
                                                                - medium
                                                                - high
                                                                - critical
                                                            description: "Severity of the issue"
                                                        recommendation:
                                                            type: string
                                                            description: "Recommendation for resolving the issue"
                                                            example: "Remove the secret from the file"
                                                    required:
                                                        - issue_id
                                                        - session_id
                                                        - file_kind
                                                        - type
                                                        - severity
                                                        - recommendation
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/IssueResolvedEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408289
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - issue_resolved
                                                properties:
                                                    type: object
                                                    properties:
                                                        issue_id:
                                                            type: string
                                                            description: "Unique identifier for the issue"
                                                            example: issue_12345
                                                        resolution:
                                                            type: string
                                                            enum:
                                                                - fixed
                                                                - ignored
                                                                - allowlisted
                                                            description: "How the issue was resolved"
                                                    required:
                                                        - issue_id
                                                        - resolution
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/SessionRestoredEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408289
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - session_restored
                                                properties:
                                                    type: object
                                                    properties:
                                                        session_id:
                                                            type: string
                                                            description: "Unique identifier for the session"
                                                            example: sess_12345
                                                        files_restored:
                                                            type: array
                                                            items:                                 type: string
                                                            description: "List of files that were restored"
                                                            example:
                                                                - src/index.ts
                                                                - package.json
                                                        time_to_restore_ms:
                                                            type: number
                                                            description: "Time taken to restore the session in milliseconds"
                                                            example: 2500
                                                        reason:
                                                            type: string
                                                            description: "Reason for the session restoration"
                                                            example: "User requested rollback"
                                                    required:
                                                        - session_id
                                                        - files_restored
                                                        - time_to_restore_ms
                                                        - reason
                                - 
                                    allOf:
                                        -                       $ref: "#/components/schemas/PolicyChangedEvent"
                                        - 
                                            properties:
                                                event_version:
                                                    type: string
                                                    default: 1.0.0
                                                    example: 1.0.0
                                                timestamp:
                                                    type: number
                                                    default: 1762276408289
                                                    example: 1620000000000
                                                event:
                                                    type: string
                                                    enum:                             - policy_changed
                                                properties:
                                                    type: object
                                                    properties:
                                                        pattern:
                                                            type: string
                                                            description: "File pattern that the policy applies to"
                                                            example: *.env
                                                        from:
                                                            type: string
                                                            enum:
                                                                - watch
                                                                - warn
                                                                - block
                                                                - unprotected
                                                            description: "Previous protection level"
                                                        to:
                                                            type: string
                                                            enum:
                                                                - watch
                                                                - warn
                                                                - block
                                                                - unprotected
                                                            description: "New protection level"
                                                        source:
                                                            type: string
                                                            description: "Source of the policy change"
                                                            example: dashboard
                                                    required:
                                                        - pattern
                                                        - from
                                                        - to
                                                        - source
            responses:
                200:           description: "Event received successfully"
                400:           description: "Invalid event data"