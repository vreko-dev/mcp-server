# SnapBack Surveys Configuration
# Generated: 2025-11-07

surveys:
  - id: nps-d7
    type: nps
    name: "7-Day NPS Survey"
    trigger:
      event: user_activated
      delay_days: 7
      conditions:
        - has_created_snapshot: true
        - min_sessions: 3
    targeting:
      percentage: 5
      max_monthly: 100
      exclusions:
        - received_survey_within_30d
        - is_team_admin
    questions:
      - type: nps
        text: "How likely are you to recommend SnapBack to a colleague?"
        scale: 0-10
      - type: text
        text: "What's the main reason for your score?"
        required: false
        max_length: 500
    followup:
      detractors:
        - type: text
          text: "What can we improve?"
      promoters:
        - type: text
          text: "What do you love most about SnapBack?"

  - id: nps-d30
    type: nps
    name: "30-Day NPS Survey"
    trigger:
      event: user_activated
      delay_days: 30
      conditions:
        - has_created_snapshot: true
        - min_sessions: 10
    targeting:
      percentage: 5
      max_monthly: 100
      exclusions:
        - received_survey_within_30d
    questions:
      - type: nps
        text: "How likely are you to recommend SnapBack to a colleague?"
        scale: 0-10
      - type: multiple_choice
        text: "Which features do you use most?"
        options:
          - "Automatic snapshots"
          - "AI detection"
          - "Code restoration"
          - "Team collaboration"
          - "Analytics dashboard"
        multi_select: true

  - id: feature-snapshot-restore
    type: micro
    name: "Snapshot Restoration Feedback"
    trigger:
      event: snapshot_restored
      delay_minutes: 1
      conditions:
        - first_restoration: true
    targeting:
      percentage: 100
      max_monthly: 50
    questions:
      - type: rating
        text: "How easy was it to restore your code?"
        scale: 1-5
        labels:
          1: "Very difficult"
          5: "Very easy"
      - type: text
        text: "Any issues or suggestions?"
        required: false
        max_length: 200

  - id: feature-ai-detection
    type: micro
    name: "AI Detection Accuracy"
    trigger:
      event: ai_detected
      delay_minutes: 5
      conditions:
        - detection_count_mod_10: 0  # Every 10th detection
    targeting:
      percentage: 10
      max_monthly: 30
    questions:
      - type: yes_no
        text: "Was this AI detection accurate?"
      - type: rating
        text: "How confident are you in our AI detection?"
        scale: 1-5

  - id: exit-downgrade
    type: exit
    name: "Subscription Downgrade Survey"
    trigger:
      event: subscription_downgraded
      delay_minutes: 0
    targeting:
      percentage: 100
      max_monthly: 50
    questions:
      - type: multiple_choice
        text: "Why are you downgrading?"
        options:
          - "Too expensive"
          - "Not using enough"
          - "Missing features"
          - "Found alternative"
          - "Technical issues"
          - "Other"
        required: true
      - type: text
        text: "What would make you reconsider?"
        required: false
        max_length: 500
      - type: multiple_choice
        text: "Which features will you miss most?"
        options:
          - "Unlimited snapshots"
          - "Advanced analytics"
          - "Team features"
          - "Priority support"
        multi_select: true

  - id: exit-cancel
    type: exit
    name: "Subscription Cancellation Survey"
    trigger:
      event: subscription_cancelled
      delay_minutes: 0
    targeting:
      percentage: 100
      max_monthly: 50
    questions:
      - type: multiple_choice
        text: "Why are you leaving SnapBack?"
        options:
          - "No longer need it"
          - "Too expensive"
          - "Switching to competitor"
          - "Poor performance"
          - "Lack of features"
          - "Other"
        required: true
      - type: text
        text: "What could we have done better?"
        required: false
        max_length: 1000
      - type: nps
        text: "How likely are you to return to SnapBack?"
        scale: 0-10

  - id: onboarding-completion
    type: micro
    name: "Onboarding Success"
    trigger:
      event: onboarding_completed
      delay_minutes: 0
    targeting:
      percentage: 20
      max_monthly: 100
    questions:
      - type: rating
        text: "How smooth was the setup process?"
        scale: 1-5
      - type: yes_no
        text: "Did you encounter any issues?"
      - type: text
        text: "What confused you most?"
        required: false
        condition: previous_answer_yes

configuration:
  delivery:
    channels:
      - in_app
      - email
    max_attempts: 3
    retry_delay_hours: 24
    
  rate_limits:
    global_monthly_cap: 250
    per_user_monthly: 2
    targeting_percentage_default: 5
    
  analytics:
    track_views: true
    track_dismissals: true
    track_completions: true
    track_time_to_complete: true
    
  storage:
    responses_table: survey_responses
    targeting_table: survey_targeting
    exclusions_table: survey_exclusions
    
  integrations:
    posthog:
      enabled: true
      sync_responses: true
      sync_segments: true
    slack:
      enabled: true
      channel: "#feedback"
      notify_nps_detractors: true
      notify_exit_surveys: true