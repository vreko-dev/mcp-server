# ──────────────────────────────────────────────────────────────────────────────
# 2) ADAPTER — REDACTION DEPTH + QUARANTINE + UNIFIED SLOW-THRESHOLD
# ──────────────────────────────────────────────────────────────────────────────
- id: redaction-helpers
  desc: "Ensure redactObjectDeep helper exists and exported"
  run: |
    mkdir -p packages/analytics/src
    # Only create helper if it doesn't exist
    [ -f packages/analytics/src/redaction.ts ] || cat > packages/analytics/src/redaction.ts <<'TS'
export function redactString(s: string){ return s.replace(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/g,'<redacted:email>').replace(/\b\d{3}[-.\s]?\d{2,3}[-.\s]?\d{4}\b/g,'<redacted:phone>'); }
export function redactObjectDeep<T=unknown>(v:T):T{
  if (v===null||v===undefined) return v;
  if (typeof v==='string') return redactString(v) as any;
  if (Array.isArray(v)) return v.map(x=>redactObjectDeep(x)) as any;
  if (typeof v==='object'){ const o:any={}; for(const k of Object.keys(v as any)){ o[k]=redactObjectDeep((v as any)[k]); } return o; }
  return v;
}
TS
    git add packages/analytics/src/redaction.ts
    git commit -m "analytics: add redaction helpers (deep)" || true

- id: adapter-patch
  desc: "Patch TelemetrySinkDb to use deep redaction, quarantine on error, and unified slow threshold"
  run: |
    node - <<'NODE'
const fs=require('fs'); const p='packages/platform/src/db/adapters/TelemetrySinkDb.ts';
if(!fs.existsSync(p)) process.exit(0);
let s=fs.readFileSync(p,'utf8'); let ch=false;
if(!/redactObjectDeep/.test(s)){ s=`import { redactString, redactObjectDeep } from '../../../analytics/src/redaction.js';\n`+s; ch=true; }
if(!/const SLOW_MS/.test(s)){ s=s.replace(/(^export class|^class)/m, "const SLOW_MS=200; // unified slow-query threshold\\n$&"); ch=true; }
if(!/applyRedaction\(/.test(s)){
  s+=`
function applyRedaction(e:any){
  const r={...e};
  for(const k of ['suggestionText','filePath','userFeedback','errorMessage','feedbackText']) if(k in r) r[k]=redactString(String(r[k]));
  if('violations'in r) r.violations=redactObjectDeep(r.violations);
  if('remediationSteps'in r) r.remediationSteps=redactObjectDeep(r.remediationSteps);
  return r;
}
`; ch=true;
}
if(ch){ fs.writeFileSync(p,s); console.log('TelemetrySinkDb patched'); }
NODE
    git add packages/platform/src/db/adapters/TelemetrySinkDb.ts
    git commit -m "db(adapter): deep redaction + unified SLOW_MS" || true

# ──────────────────────────────────────────────────────────────────────────────
# 3) ANALYTICS — DYNAMIC FILTERS + RETENTION CLOCK + TIME-TRAVEL TEST
