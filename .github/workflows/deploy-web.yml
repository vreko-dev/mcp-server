name: Deploy Web App

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        default: "preview"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-validate.yml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (preview|production)"
        required: true
        default: "preview"

jobs:
  validate:
    name: Validate Web App
    uses: ./.github/workflows/web-validate.yml

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.event_name == 'workflow_call' && inputs.environment) || (github.ref == 'refs/heads/main' && 'production' || 'preview') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Toolchain setup
        uses: ./.github/actions/setup-pnpm

      - name: Build web app
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm --filter @snapback/web run build

      - name: Deploy with Vercel
        id: deploy
        uses: vercel/actions/deploy@v2
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          org-id: ${{ secrets.VERCEL_TEAM_ID }}
          working-directory: apps/web
          prod: ${{ github.ref == 'refs/heads/main' }}

      - name: Output deployment URL
        run: echo "Deployment URL ${{ steps.deploy.outputs.preview-url }}"
