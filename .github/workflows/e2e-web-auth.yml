name: E2E Tests - Web Auth

on:
    pull_request:
        paths:
            - "apps/web/**"
            - "packages/auth/**"
            - ".github/workflows/e2e-web-auth.yml"
    push:
        branches:
            - main
        paths:
            - "apps/web/**"
            - "packages/auth/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    e2e-auth:
        name: Auth Flow E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: pnpm --filter @snapback/web exec playwright install --with-deps chromium

            - name: Build packages
              run: pnpm build --filter @snapback/auth --filter @snapback/contracts

            - name: Run E2E auth tests
              run: pnpm --filter @snapback/web test:e2e:auth
              env:
                  CI: true
                  PLAYWRIGHT_BASE_URL: http://localhost:3000

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-auth
                  path: apps/web/playwright-report/
                  retention-days: 7

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results-auth
                  path: apps/web/test-results/
                  retention-days: 7

    e2e-all:
        name: All E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers
              run: pnpm --filter @snapback/web exec playwright install --with-deps

            - name: Build packages
              run: pnpm build --filter @snapback/auth --filter @snapback/contracts

            - name: Run all E2E tests
              run: pnpm --filter @snapback/web test:e2e
              env:
                  CI: true
                  PLAYWRIGHT_BASE_URL: http://localhost:3000

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-all
                  path: apps/web/playwright-report/
                  retention-days: 30

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results-all
                  path: apps/web/test-results/
                  retention-days: 30
