# Minimal Development Docker Compose Configuration
# Use this for lightweight local development with just database and cache
# Usage: docker-compose -f docker-compose.dev-minimal.yml up

version: "3.8"

services:
  # ===== DATABASE =====
  postgres:
    image: postgres:16-alpine
    container_name: snapback-postgres
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Memory optimization for development
      POSTGRES_INITDB_ARGS: "-c shared_buffers=128MB -c effective_cache_size=256MB -c maintenance_work_mem=32MB -c work_mem=8MB -c max_connections=50"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/platform/drizzle/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - snapback
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: snapback-redis
    command: redis-server --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - snapback
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ===== DATABASE MIGRATIONS =====
  migrations:
    image: postgres:16-alpine
    container_name: snapback-migrations
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./packages/platform/drizzle/migrations:/migrations:ro
      - ./ops/scripts/run-migrations.sh:/run-migrations.sh:ro
    command: sh /run-migrations.sh
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snapback
    restart: "no"

volumes:
  postgres-data:

networks:
  snapback:
    driver: bridge
