version: 1.0
name: SnapBack — Prevention Pivot (Final with 2MB VSIX)
agent: QODER

globals:
  language: "TypeScript"
  deterministic: true
  no_network: true
  coverage: true
  directories:
    reports: "reports/pivot"
    tmp: "test/.tmp"
    src_ext: "apps/vscode"
    src_cli: "packages/cli"
    src_core: "packages/core"
    src_policy: "packages/policy-engine"
    src_integrations: "packages/integrations"
    src_action: "packages/github-action"
    webview: "apps/vscode/webview-ui"
  budgets:
    activation_p95_ms: 500
    memory_peak_mb: 200
    diagnostics_latency_ms: 120
    statusbar_update_ms: 100
    vsix_size_mb: 2          # TIGHTENED
    webview_bundle_kb: 300
    docker_build_time_seconds: 300
    mcp_response_time_ms: 200

policies:
  networking: "blocked"
  secrets: "mock"
  file_system: "sandboxed tmp dirs under test/.tmp"
  test_selection: "incremental"
  cache_results: true
  flake_detection: { enabled: true, retries: 2, report: "test/.flaky-tests.json" }

matrix:
  tier1: [{ os: "linux", node: "20", vscode: "stable" }]
  fast_fail: true

parallel_groups:
  p1_ui:   ["P1-A","P1-B","P1-C","P1-F"]
  p1_hooks:["P1-D"]
  p1_docs: ["P1-E"]
  ai_int:  ["P2-A","P2-B","P2-C"]
  gates:   ["P2-D","P2-E","P2-F"]
  intel:   ["P2-G"]
  appsec:  ["P3-A","P3-B","P3-C","P3-D","P3-E"]
  ent:     ["P3-F","P3-G","P3-H"]
  final:   ["P0-VSIX-SIZE","Q6-A","Q6-B"]

setup:
  id: S0
  title: Bootstrap (tooling, budgets, scaffolds)
  steps:
    - mkdir: ["reports/pivot", "test/.tmp", ".qoder-build-cache"]
    - package_json:
        add_dev_deps:
          - "esbuild"
          - "dependency-cruiser"
          - "madge"
          - "jscpd"
          - "typescript"
          - "ts-node"
          - "playwright"
          - "zod"
    - create: "apps/vscode/src/guardian/DiagnosticPublisher.ts"
      content: |
        import * as vscode from 'vscode';
        export class DiagnosticPublisher {
          private collection = vscode.languages.createDiagnosticCollection('snapback');
          publish(uri: vscode.Uri, diags: vscode.Diagnostic[]) { this.collection.set(uri, diags); }
          clear(uri: vscode.Uri) { this.collection.delete(uri); }
          dispose() { this.collection.dispose(); }
        }
  acceptance:
    - "Tooling installed and baseline files created"

packs:
  # ========= PHASE 1 — Make Detection Visible =========
  - id: P1-A
    title: Guardian → VS Code Diagnostics
    parallel_group: "p1_ui"
    depends_on: [S0]
    files:
      - "apps/vscode/src/**/SaveHandler.ts"
      - "apps/vscode/src/guardian/DiagnosticPublisher.ts"
      - "apps/vscode/package.json"
      - "test/integration/diagnostics.spec.ts"
    watch_files:
      - "apps/vscode/src/**/SaveHandler.ts"
      - "apps/vscode/src/guardian/**/*"
      - "apps/vscode/package.json"
    steps:
      - patch: |
          // Inject pre-save Guardian check: analyze→map→publish; block on risk>8 with vscode.CancellationError
      - scaffold_spec:
          file: "test/integration/diagnostics.spec.ts"
          title: "Guardian diagnostics publishing"
          ids: ["diag-001","diag-002","diag-003"]
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Correct severity mapping; blocking path verified"
      - "Publish latency ≤ ${globals.budgets.diagnostics_latency_ms}ms"

  - id: P1-B
    title: Status Bar Risk Scoring
    parallel_group: "p1_ui"
    depends_on: [S0]
    files:
      - "apps/vscode/src/ui/status.ts"
      - "test/integration/statusbar.spec.ts"
    watch_files:
      - "apps/vscode/src/ui/status.ts"
      - "apps/vscode/src/**/SaveHandler.ts"
    steps:
      - create: "apps/vscode/src/ui/status.ts"
        content: |
          // export setRisk(uri, score, label); click → open Guardian report
      - scaffold_spec: { file: "test/integration/statusbar.spec.ts", title: "Status bar updates", ids: ["sb-001","sb-002"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Displays ⛑️ Risk: <LEVEL> (X.Y/10); click opens report"
      - "Update ≤ ${globals.budgets.statusbar_update_ms}ms"

  - id: P1-C
    title: Guardian Settings Panel
    parallel_group: "p1_ui"
    depends_on: [S0]
    files:
      - "apps/vscode/package.json"
      - "apps/vscode/src/config/runtime.ts"
      - "test/integration/settings.guardian.spec.ts"
    steps:
      - patch: |
          // contributes.configuration: plugin toggles; warn/block thresholds; protectionLevel
      - create: "apps/vscode/src/config/runtime.ts"
        content: |
          // read workspace.getConfiguration('snapback.guardian'); expose onDidChange + getters
      - scaffold_spec: { file: "test/integration/settings.guardian.spec.ts", title: "Guardian settings", ids: ["cfg-001","cfg-002","cfg-003"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Toggles/thresholds applied without reload"

  - id: P1-D
    title: Git Hooks + CLI `snapback check`
    parallel_group: "p1_hooks"
    depends_on: [S0]
    files:
      - "packages/cli/src/check.ts"
      - "apps/vscode/scripts/postinstall.js"
      - "test/integration/git-hooks.spec.ts"
    steps:
      - create: "packages/cli/src/check.ts"
        content: |
          // staged files → Guardian → exit 1 on critical; --bypass logs reason
      - create: "apps/vscode/scripts/postinstall.js"
        content: |
          const fs=require('fs');const p=require('path');
          const hook=`#!/bin/sh
          pnpm --silent snapback:check --staged
          if [ $? -ne 0 ]; then echo "❌ SnapBack blocked commit"; exit 1; fi
          `;
          const fp=p.join(process.cwd(),'../../.git/hooks/pre-commit');
          fs.writeFileSync(fp,hook,{mode:0o755});console.log('✅ pre-commit installed');
      - scaffold_spec: { file: "test/integration/git-hooks.spec.ts", title: "Pre-commit enforcement", ids: ["hook-001","hook-002"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Critical findings block commit; bypass recorded"

  - id: P1-E
    title: MCP Marketplace + Docs
    parallel_group: "p1_docs"
    depends_on: [S0]
    files:
      - "docs/mcp/README.md"
      - "docs/mcp/quickstart.md"
      - "docs/mcp/tools.md"
      - "apps/vscode/README.md"
    steps:
      - write_markdown_summary: "reports/pivot/p1-docs.md"
      - run: "pnpm -s turbo run build --cache-dir .qoder-build-cache"
    acceptance:
      - "Docs scaffolded: quickstart + tool reference"

  - id: P1-F
    title: Webview CSP & Messaging conformance
    parallel_group: "p1_ui"
    depends_on: [P1-A,P1-C]
    files:
      - "apps/vscode/package.json"
      - "apps/vscode/webview-ui/index.html"
      - "apps/vscode/webview-ui/settings.html"
      - "reports/explore/webview-messaging.json"
      - "reports/explore/webview-settings-messaging.json"
      - "test/integration/webview-csp.spec.ts"
    steps:
      - assert_webview_csp:
          html_entries:
            - "apps/vscode/webview-ui/index.html"
            - "apps/vscode/webview-ui/settings.html"
          must_include:
            - "default-src 'none'"
            - "script-src 'nonce-"
            - "style-src 'nonce-"
            - "frame-ancestors 'none'"
          allowlists:
            img_src: ["vscode-resource:", "https://*.snapback.ai", "data:"]
            connect_src: ["https://*.snapback.ai", "https://*.posthog.com"]
      - scaffold_spec:
          file: "test/integration/webview-csp.spec.ts"
          title: "Webview CSP + messaging schema"
          ids: ["csp-001","csp-002"]
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Nonce CSP enforced; messaging matches schema"

  # ========= PHASE 2 — True Prevention =========
  - id: P2-A
    title: Copilot Interception (research + fallback)
    parallel_group: "ai_int"
    depends_on: [P1-A,P1-B,P1-C]
    files:
      - "apps/vscode/src/ai/copilot/intercept.ts"
      - "test/integration/copilot-intercept.spec.ts"
    steps:
      - create: "apps/vscode/src/ai/copilot/intercept.ts"
        content: |
          // API hook if available; else watch Copilot staging; score/block via Guardian with override reason
      - scaffold_spec: { file: "test/integration/copilot-intercept.spec.ts", title: "Copilot scoring/block", ids: ["cp-001","cp-002","cp-003"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Risky suggestions flagged; criticals blocked unless overridden (reason captured)"

  - id: P2-B
    title: Cursor/Continue via MCP guard (latency-budgeted)
    parallel_group: "ai_int"
    depends_on: [P1-A]
    files:
      - "packages/core/src/mcp/analyze_before_apply.ts"
      - "apps/mcp-server/src/index.ts"
      - "apps/mcp-server/src/context7/Context7Service.ts"
      - "test/integration/mcp-guard.spec.ts"
    steps:
      - patch: |
          // analyze_before_apply: accept diff → Guardian → {decision, reasons}; tests offline via fixtures
      - scaffold_spec:
          file: "test/integration/mcp-guard.spec.ts"
          title: "MCP interception with latency budget"
          ids: ["mcp-001","mcp-002"]
      - run_with_budgets:
          cmd: "pnpm test:int"
          budgets:
            mcp_response_time_ms: 200
    acceptance:
      - "Decision honored; p95 latency ≤ 200ms (fixtures)"

  - id: P2-C
    title: Generic FS Interceptor (Windsurf/Aider/etc.)
    parallel_group: "ai_int"
    depends_on: [P1-A]
    files:
      - "apps/vscode/src/ai/fs/agentWatcher.ts"
      - "test/integration/agent-fs.spec.ts"
    steps:
      - create: "apps/vscode/src/ai/fs/agentWatcher.ts"
        content: |
          // chokidar on .continue/pending, .cursor/tmp, etc. → analyze diffs pre-apply; block with override reason
      - scaffold_spec: { file: "test/integration/agent-fs.spec.ts", title: "FS interception", ids: ["fs-001","fs-002"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Deterministic blocking path + override capture"

  - id: P2-D
    title: Policy Engine + .snapbackrc
    parallel_group: "gates"
    depends_on: [P1-D]
    files:
      - "packages/policy-engine/src/index.ts"
      - "apps/vscode/src/policy/runtime.ts"
      - "test/unit/policy.spec.ts"
    steps:
      - create: "packages/policy-engine/src/index.ts"
        content: |
          // JSON schema: requireReview, protectedGlobs[], severity thresholds
      - scaffold_spec: { file: "test/unit/policy.spec.ts", title: "Policy evaluation", ids: ["pol-001","pol-002","pol-003"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Rules enforced: AI changes reviewed; protected paths require security review"

  - id: P2-E
    title: Git Enforcement (pre-push) + Commit Metadata
    parallel_group: "gates"
    depends_on: [P2-D]
    files:
      - "packages/cli/src/prepush.ts"
      - "test/integration/prepush.spec.ts"
    steps:
      - create: "packages/cli/src/prepush.ts"
        content: |
          // verify AI-tagged changes have --reviewed-by; block otherwise
      - scaffold_spec: { file: "test/integration/prepush.spec.ts", title: "Pre-push enforcement", ids: ["pp-001","pp-002"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "Push blocked until review metadata present"

  - id: P2-F
    title: PR Scanning (GitHub Action)
    parallel_group: "gates"
    depends_on: [P2-D]
    files:
      - "packages/github-action/action.yml"
      - "packages/github-action/index.js"
      - "test/integration/gha.spec.ts"
    steps:
      - create: "packages/github-action/action.yml"
        content: |
          # run Guardian on PR diff; comment findings; fail check on criticals (offline fixtures in tests)
      - scaffold_spec: { file: "test/integration/gha.spec.ts", title: "Action wiring", ids: ["gha-001"] }
      - run_incremental: "pnpm test:int"
    acceptance:
      - "PR comment + failing check on criticals"

  - id: P2-G
    title: Hallucination Detection++ (deps intelligence)
    parallel_group: "intel"
    depends_on: [P1-A]
    files:
      - "packages/core/src/guardian/plugins/phantomDependency.ts"
      - "test/unit/phantom-dep.spec.ts"
    steps:
      - patch: |
          // add Levenshtein near-miss + AI-suggested flag; OSV/Socket stubs for offline tests
      - scaffold_spec: { file: "test/unit/phantom-dep.spec.ts", title: "Phantom/typosquat detection", ids: ["pd-001","pd-002","pd-003"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Non-existent/typosquat deps flagged; higher severity for AI-suggested"

  # ========= PHASE 3 — Enterprise & Ecosystem =========
  - id: P3-A
    title: Webhooks & External Events
    parallel_group: "appsec"
    files:
      - "packages/integrations/src/webhooks/index.ts"
      - "test/unit/webhooks.spec.ts"
    steps:
      - create: "packages/integrations/src/webhooks/index.ts"
        content: |
          // POST on snapshot/guardian events; retry/backoff; offline fixtures for tests
      - scaffold_spec: { file: "test/unit/webhooks.spec.ts", title: "Webhook payloads", ids: ["wh-001","wh-002"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Stable schema + retries verified"

  - id: P3-B
    title: Snyk/Checkmarx/Mend Bridges (stubs)
    parallel_group: "appsec"
    files:
      - "packages/integrations/src/snyk.ts"
      - "packages/integrations/src/checkmarx.ts"
      - "packages/integrations/src/mend.ts"
      - "test/unit/integrations.spec.ts"
    steps:
      - create: "packages/integrations/src/snyk.ts"
        content: |
          // map Guardian findings → provider format (offline)
      - scaffold_spec: { file: "test/unit/integrations.spec.ts", title: "Provider mapping", ids: ["int-001","int-002","int-003"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Mapping correctness without network calls"

  - id: P3-C
    title: Custom Policy Engine ↔ Providers
    parallel_group: "appsec"
    depends_on: [P3-B,P2-D]
    files:
      - "packages/policy-engine/src/provider-gates.ts"
      - "test/unit/provider-gates.spec.ts"
    steps:
      - create: "packages/policy-engine/src/provider-gates.ts"
        content: |
          // merge provider criticals into SnapBack block decisions
      - scaffold_spec: { file: "test/unit/provider-gates.spec.ts", title: "External gate merge", ids: ["pg-001","pg-002"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "External criticals trigger block decisions"

  - id: P3-D
    title: CVE/NVD Intake + Dep Graph
    parallel_group: "appsec"
    files:
      - "packages/integrations/src/cve/nvd.ts"
      - "packages/core/src/deps/graph.ts"
      - "test/unit/cve-graph.spec.ts"
    steps:
      - create: "packages/core/src/deps/graph.ts"
        content: |
          // build dep tree from lockfile (fixtures); resolve transitive deps
      - scaffold_spec: { file: "test/unit/cve-graph.spec.ts", title: "CVE + Graph", ids: ["cve-001","cve-002"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Known CVEs detected (fixtures)"

  - id: P3-E
    title: Auto-Fix Suggestions
    parallel_group: "appsec"
    depends_on: [P3-D]
    files:
      - "packages/core/src/fixes/suggester.ts"
      - "test/unit/fixes.spec.ts"
    steps:
      - create: "packages/core/src/fixes/suggester.ts"
        content: |
          // suggest minimal semver upgrades w/ CVE references; produce patch plan
      - scaffold_spec: { file: "test/unit/fixes.spec.ts", title: "Fix suggester", ids: ["fix-001","fix-002"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Upgrade recs generated with references"

  - id: P3-F
    title: Team Policy & RBAC (foundations)
    parallel_group: "ent"
    files:
      - "packages/policy-engine/src/rbac.ts"
      - "test/unit/rbac.spec.ts"
    steps:
      - create: "packages/policy-engine/src/rbac.ts"
        content: |
          // roles: Admin, SecurityLead, Developer; perms: override_block, view_audit
      - scaffold_spec: { file: "test/unit/rbac.spec.ts", title: "RBAC basics", ids: ["rbac-001","rbac-002"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Permissions enforced"

  - id: P3-G
    title: Audit Logging + Analytics (foundations)
    parallel_group: "ent"
    files:
      - "packages/core/src/audit/logger.ts"
      - "packages/core/src/analytics/metrics.ts"
      - "test/unit/audit-analytics.spec.ts"
    steps:
      - create: "packages/core/src/audit/logger.ts"
        content: |
          // append-only structured logs; redact PII
      - create: "packages/core/src/analytics/metrics.ts"
        content: |
          // counters: incidents_prevented, overrides, time_to_restore
      - scaffold_spec: { file: "test/unit/audit-analytics.spec.ts", title: "Audit + metrics", ids: ["au-001","au-002"] }
      - run_incremental: "pnpm test:unit"
    acceptance:
      - "Overrides recorded; metrics exposed"

  - id: P3-H
    title: Turbo + Docker budget gate
    parallel_group: "ent"
    files:
      - "turbo.json"
      - "apps/mcp-server/Dockerfile"
      - "test/perf/docker-build.spec.ts"
    steps:
      - run: "pnpm -s turbo run build --cache-dir .qoder-build-cache"
      - run_with_budgets:
          cmd: "pnpm -s exec bash -lc 'time -p docker build -f apps/mcp-server/Dockerfile . >/dev/null 2>&1'"
          budgets:
            docker_build_time_seconds: 300
      - scaffold_spec: { file: "test/perf/docker-build.spec.ts", title: "Docker build time", ids: ["dock-001"] }
      - run_incremental: "pnpm test:perf"
    acceptance:
      - "Docker build within budget; turbo cache engaged"

  # ========= HARD SIZE GATE (≤ 2 MB) =========
  - id: P0-VSIX-SIZE
    title: VSIX size gate (≤ 2 MB)
    depends_on: [P1-A,P1-B,P1-C,P1-F]
    steps:
      - run: "pnpm -s --filter=apps/vscode build"  # use your turbo pipeline under the hood
      - run: "pnpm -s --filter=apps/vscode vsce package --no-dependencies -o .qoder-build-cache/snapback.vsix"
      - assert_file_size:
          file: ".qoder-build-cache/snapback.vsix"
          max_mb: 2
    acceptance:
      - "VSIX ≤ 2 MB"

  # ========= FINAL GATES =========
  - id: Q6-A
    title: Lint/Type/Coverage/Budgets final gate (pnpm + turbo)
    depends_on: [P0-VSIX-SIZE,P3-H]
    steps:
      - run: "pnpm -s turbo run lint --cache-dir .qoder-build-cache"
      - run: "pnpm -s turbo run build --cache-dir .qoder-build-cache"
      - run: "pnpm -s turbo run test --cache-dir .qoder-build-cache"
      - run: "pnpm -s run check:budgets"
    acceptance:
      - "Coverage thresholds met; performance + size budgets respected"

  - id: Q6-B
    title: Senior review bundle
    depends_on: [Q6-A]
    steps:
      - generate_report:
          file: "reports/pivot/FINAL-REVIEW.md"
          sections:
            - "Executive Summary"
            - "API Surface & Boundaries"
            - "Perf/Memory/Size Results"
            - "A11y/DX Notes"
            - "Policy & Enforcement"
            - "Zero-TODO attestation"
      - pr_template:
          file: ".github/PULL_REQUEST_TEMPLATE.md"
          includes:
            - "[ ] TDD followed (red→green→refactor links)"
            - "[ ] Coverage/budgets report attached"
            - "[ ] No TODO/FIXME"
            - "[ ] Pattern-true audit"
            - "[ ] VSIX ≤ 2 MB"
    acceptance:
      - "Final report + PR template written"

postconditions:
  - "M1 (Week 4): Diagnostics, status bar, settings; git hook; docs"
  - "M2 (Week 10–12): AI interception + policy gates + PR scanning + hallucination++"
  - "M3 (Week 16+): AppSec webhooks/bridges; CVE graph & fixes; RBAC/audit"
  - "Budgets enforced: activation ≤ 500ms, mem ≤ 200MB, webview ≤ 300KB, VSIX ≤ 2MB, MCP ≤ 200ms, Docker ≤ 300s"
