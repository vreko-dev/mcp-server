name: Alpha CI Gates

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  guards:
    name: CI Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Guard Script
        run: bash scripts/ci/guard.sh

  build:
    name: Build & Test
    needs: guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.14.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
