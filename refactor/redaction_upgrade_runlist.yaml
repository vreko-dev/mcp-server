    mkdir -p .github/workflows
    cat > .github/workflows/verify.yml <<'YML'
name: verify
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 8 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: pnpm install --frozen-lockfile
      - name: Unit & Integration Tests
        run: pnpm -w vitest run --coverage
      - name: Optional DB Assertions
        env: { DATABASE_URL: ${{ secrets.DATABASE_URL }} }
        run: pnpm db:assert
      - name: Project Verify Script (optional)
        run: |
          if [ -x ./verify.sh ]; then ./verify.sh; else echo "verify.sh not present — skipping"; fi
