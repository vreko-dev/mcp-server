name: Web App Validation

on:
    workflow_call:
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Toolchain setup
              uses: ./.github/actions/setup-pnpm

            - name: Build shared workspace packages
              run: |
                  pnpm --filter @snapback/contracts build
                  pnpm --filter @snapback/core build
                  pnpm --filter @snapback/storage build
                  pnpm --filter @snapback/utils build || echo "No build script for @snapback/utils, skipping"

            - name: Type check
              run: pnpm --filter @snapback/web run type-check

            - name: Lint
              run: pnpm --filter @snapback/web run lint

            - name: Unit tests
              env:
                  CI: "true"
              run: pnpm --filter @snapback/web run test

            - name: Coverage
              env:
                  CI: "true"
              run: pnpm --filter @snapback/web run test:coverage

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: web-coverage
                  path: apps/web/coverage
                  if-no-files-found: warn

            - name: Build (Next.js)
              env:
                  NEXT_TELEMETRY_DISABLED: "1"
                  CI: "true"
              run: pnpm --filter @snapback/web run build

            - name: Upload build artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: web-next-build
                  path: |
                      apps/web/.next
                      apps/web/out
                  if-no-files-found: warn

            - name: Run Lighthouse CI
              env:
                  LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
                  CI: "true"
              run: |
                  # Start Next.js server in background
                  cd apps/web
                  pnpm start &
                  SERVER_PID=$!

                  # Ensure server is killed on exit (success or failure)
                  trap "kill $SERVER_PID 2>/dev/null || true" EXIT

                  # Wait for server to be ready
                  echo "Waiting for server to start..."
                  npx wait-on http://localhost:3000 --timeout 60000

                  # Run Lighthouse CI
                  npx @lhci/cli@latest autorun

            - name: Upload Lighthouse reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouse-reports
                  path: |
                      apps/web/.lighthouseci
                      apps/web/lighthouse-*.html
                  if-no-files-found: warn
