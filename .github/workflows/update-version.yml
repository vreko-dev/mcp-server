name: Update Version

on:
    release:
        types: [published]

jobs:
    update-version:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.12.0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "pnpm"

            - name: Update version in package.json files
              run: |
                  # Get the release tag
                  TAG_NAME=${{ github.event.release.tag_name }}
                  VERSION=${TAG_NAME#v}  # Remove 'v' prefix

                  # Update root package.json
                  jq --arg version "$VERSION" '.version = $version' package.json > tmp.$$.json && mv tmp.$$.json package.json

                  # Update VS Code extension package.json
                  jq --arg version "$VERSION" '.version = $version' apps/vscode/package.json > tmp.$$.json && mv tmp.$$.json apps/vscode/package.json

                  # Update other package.json files if they exist
                  for package in packages/*/package.json; do
                    if [ -f "$package" ]; then
                      jq --arg version "$VERSION" '.version = $version' "$package" > tmp.$$.json && mv tmp.$$.json "$package"
                    fi
                  done

            - name: Commit version updates
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add package.json apps/vscode/package.json packages/*/package.json
                  git commit -m "chore: update version to ${{ github.event.release.tag_name }}"
                  git push
