name: Publish @snapback/cli to npm

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.2.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @snapback/cli build

      - name: Run tests
        run: pnpm --filter @snapback/cli test

      - name: Publish to npm
        run: pnpm --filter @snapback/cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/cli-')
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## @snapback/cli

            Install globally:
            ```bash
            npm install -g @snapback/cli
            ```

            Or use with npx:
            ```bash
            npx @snapback/cli --help
            ```

            See [CHANGELOG.md](./CHANGELOG.md) for changes in this release.
          draft: false
          prerelease: false
