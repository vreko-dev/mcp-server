# Lefthook configuration for SnapBack Site
# Three-tier validation approach (Industry-standard performance):
# 1. Pre-commit (<5s): Lint and type check only staged files
# 2. Pre-push (15-30s): Lint, typecheck, and unit tests for AFFECTED packages only
# 3. CI (5-15min): Comprehensive validation including integration tests with PostgreSQL

commit-msg:
    commands:
        commitlint:
            run: npx commitlint --edit {1}

pre-commit:
    parallel: true
    commands:
        # Lockfile sync - runs first to ensure pnpm-lock.yaml stays in sync
        lockfile-sync:
            priority: 1
            glob: "**/package.json"
            run: |
                CHANGED_PACKAGES=$(git diff --cached --name-only | grep -E 'package\.json$' || true)
                if [ -n "$CHANGED_PACKAGES" ]; then
                  echo "📦 Package.json changed, updating lockfile..."
                  pnpm install --lockfile-only --ignore-scripts

                  if ! git diff --quiet pnpm-lock.yaml; then
                    echo "✅ Lockfile updated and staged"
                    git add pnpm-lock.yaml
                  else
                    echo "✅ Lockfile already in sync"
                  fi
                fi

        # Temporarily disabled: ESLint not configured in monorepo (using Biome)
        # no-unsafe-regex:
        #     glob: "packages/core/src/detection/**/*.ts"
        #     run: pnpm exec eslint {staged_files} --rule 'no-unsafe-regex:error'
        no-framer-motion:
            glob: "*.{ts,tsx,js,jsx}"
            run: |
                FRAMER_MOTION_USAGE=$(git diff --cached --name-only -G "framer-motion" --diff-filter=AM | xargs grep -l "framer-motion" 2>/dev/null || true)
                if [ -n "$FRAMER_MOTION_USAGE" ]; then
                  echo "❌ framer-motion detected in staged files:"
                  echo "$FRAMER_MOTION_USAGE"
                  echo ""
                  echo "⚠️  framer-motion is deprecated. Use 'motion/react' instead."
                  echo "   See: https://motion.dev/guides/migrate-from-framer-motion"
                  echo ""
                  echo "To skip this check: git commit --no-verify"
                  exit 1
                fi
        check-framer-motion-deps:
            glob: "package.json"
            run: pnpm run check-framer-motion
        biome-fix:
            run: pnpm -w biome check --write --unsafe --staged --files-ignore-unknown=true --no-errors-on-unmatched
        typecheck-scoped:
            run: pnpm -w turbo run type-check --filter=...[HEAD]
        lint-scoped:
            run: pnpm -w turbo run lint --filter=...[HEAD]
        # test-scoped:
        #     run: pnpm -w turbo run test --filter=...[HEAD] -- --run
        todo-scan:
            run: |
                # Check if rg (ripgrep) is available
                if command -v rg &> /dev/null; then
                    # Use ripgrep with proper regex syntax for TODO/FIXME detection
                    ! rg -E '(TODO|FIXME)' --glob '!**/node_modules/**' --glob '!**/CHANGELOG*' \
                      '.' 2>/dev/null || true
                else
                    echo "Warning: ripgrep (rg) not found, skipping TODO/FIXME scan"
                    echo "To install ripgrep: brew install ripgrep (macOS) or apt-get install ripgrep (Linux)"
                fi
            fail_text: "TODO/FIXME found — please resolve or suppress"
        # Security: Industry-standard secret detection
        # Replaces simple grep with Gitleaks (if available)
        check-secrets:
            tags: [security]
            run: |
                if command -v gitleaks &> /dev/null; then
                    gitleaks protect --staged --redact --verbose
                else
                    echo "⚠️ Gitleaks not found. Falling back to basic grep check..."
                    # Check for common secret patterns in staged files
                    STAGED_FILES=$(git diff --cached --name-only | grep -v "\.snapback/" | grep -v "\.test\." | grep -v "\.spec\." | grep -v "/test/" | grep -v "__tests__")
                    if [ -n "$STAGED_FILES" ]; then
                        SECRETS=$(echo "$STAGED_FILES" | xargs grep -E "(sk-[a-zA-Z0-9]{32,}|pk_(live|test)_[a-zA-Z0-9]{24,}|AKIA[A-Z0-9]{16}|AIza[a-zA-Z0-9_-]{35}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})" 2>/dev/null || true)
                        if [ -n "$SECRETS" ]; then
                           echo "❌ Potential API key/secret detected!"
                           echo "$SECRETS"
                           exit 1
                        fi
                    fi
                fi

        # IP Guard: Prevent proprietary code leakage into OSS packages
        # Critical for Open Core: Ensures private modules are never imported in public code
        ip-guard:
            tags: [security, ip-protection]
            glob: "packages-oss/**/*.{ts,tsx,js,jsx,json}"
            run: |
                # 1. Check for forbidden imports from private @snapback/* packages
                # Allowed: @snapback-oss/*, @snapback/mcp-server (if public)
                # Forbidden: @snapback/core, @snapback/auth, @snapback/infrastructure (private parts)

                FORBIDDEN_IMPORTS=$(grep -rE "from [\"']@snapback/(core|auth|infrastructure)[\"']" packages-oss/ --include="*.ts" --include="*.tsx" || true)
                if [ -n "$FORBIDDEN_IMPORTS" ]; then
                    echo "❌ PROPRIETARY CODE LEAK DETECTED!"
                    echo "   OSS packages cannot import from private packages:"
                    echo "$FORBIDDEN_IMPORTS"
                    echo ""
                    echo "   Solution: Move shared code to @snapback-oss/infrastructure or use dependency injection."
                    exit 1
                fi

                # 2. Check for "CONFIDENTIAL" headers
                CONFIDENTIAL=$(grep -rE "(CONFIDENTIAL|PROPRIETARY|INTERNAL USE ONLY)" packages-oss/ --include="*.ts" --include="*.tsx" || true)
                if [ -n "$CONFIDENTIAL" ]; then
                    echo "❌ CONFIDENTIAL MARKERS FOUND IN OSS CODE!"
                    echo "$CONFIDENTIAL"
                    exit 1
                fi

                echo "✅ Open Core IP boundaries secure"

pre-push:
    parallel: true
    commands:
        # DTS Build Verification - Catch type resolution issues before CI
        # Critical for preventing SDK wrapping issues (e.g., Sentry namespace exports)
        dts-build-verification:
            tags: [build, critical]
            glob: "packages/**/{tsup,tsconfig}.{json,ts}"
            run: |
                # Find packages with changed build configuration or source
                CHANGED_PKGS=$(git diff HEAD~1..HEAD --name-only 2>/dev/null | grep -E '^packages/[^/]+/(src|tsup|tsconfig)' | cut -d/ -f2 | sort -u || true)
                
                if [ -n "$CHANGED_PKGS" ]; then
                  echo "🏗️  Verifying DTS generation for changed packages..."
                  FAILED_PKGS=""
                  for pkg in $CHANGED_PKGS; do
                    PKG_NAME="@snapback/$pkg"
                    # Check if package exists and has build script
                    if [ -f "packages/$pkg/package.json" ] && grep -q '"build"' "packages/$pkg/package.json"; then
                      echo "   → Building $PKG_NAME..."
                      if ! pnpm turbo build --filter="$PKG_NAME" 2>&1 | tee /tmp/build.log; then
                        echo "❌ DTS build failed for $PKG_NAME"
                        # Check for common DTS errors
                        if grep -q "RollupError\|not exported" /tmp/build.log; then
                          echo "   💡 Likely cause: SDK namespace re-export or type resolution issue"
                          echo "   📖 See: .qoder/rules/sdk-wrapping-pattern.md"
                        fi
                        FAILED_PKGS="$FAILED_PKGS $PKG_NAME"
                      fi
                    fi
                  done
                  
                  if [ -n "$FAILED_PKGS" ]; then
                    echo "\n❌ Build verification failed for:$FAILED_PKGS"
                    echo "\nTo skip this check: git push --no-verify"
                    exit 1
                  fi
                  echo "✅ All package builds verified"
                fi
        
        # Pre-publish safety check (only on main branch)
        pre-publish-safety:
            tags: [publish, safety]
            run: |
                CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
                if [ "$CURRENT_BRANCH" = "main" ] || [ "$CURRENT_BRANCH" = "master" ]; then
                  # Check for pending changesets before push to main
                  if [ -d ".changeset" ]; then
                    CHANGESETS=$(find .changeset -name '*.md' -not -name 'README.md' | wc -l | tr -d ' ')
                    if [ "$CHANGESETS" -gt 0 ]; then
                      echo "⚠️  Pending changesets detected ($CHANGESETS files)"
                      echo "   Run pre-publish before pushing to main:"
                      echo "   pnpm pre-publish:dry-run"
                      echo ""
                      echo "   To skip: git push --no-verify"
                      exit 1
                    fi
                  fi

                  # Check for incomplete pre-publish state
                  if [ -f ".pre-publish-state.json" ]; then
                    echo "❌ Incomplete pre-publish detected!"
                    echo "   Resume: pnpm pre-publish --resume"
                    echo "   Or clean: rm .pre-publish-state.json"
                    exit 1
                  fi
                fi
        # Security: Validate React and Next.js versions (CVE-2025-55182, CVE-2025-66478)
        security-boundaries:
            tags: [security, critical]
            glob: "pnpm-workspace.yaml"
            run: |
                echo "🔒 Validating React/Next.js security boundaries..."
                # Check React version in catalog
                REACT_VERSION=$(grep '^\s*react:' pnpm-workspace.yaml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
                if [ -n "$REACT_VERSION" ]; then
                  MAJOR=$(echo $REACT_VERSION | cut -d. -f1)
                  MINOR=$(echo $REACT_VERSION | cut -d. -f2)
                  PATCH=$(echo $REACT_VERSION | cut -d. -f3)

                  # Vulnerable: 19.0.0, 19.1.0, 19.1.1, 19.2.0
                  if [ "$MAJOR" = "19" ] && [ "$MINOR" = "0" ] && [ "$PATCH" = "0" ]; then
                    echo "⚠️  CVE-2025-55182: React $REACT_VERSION is vulnerable! Upgrade to 19.0.1, 19.1.2, or 19.2.1"
                    # exit 1 # Warn only for better DX
                  fi
                  if [ "$MAJOR" = "19" ] && [ "$MINOR" = "1" ] && ([ "$PATCH" = "0" ] || [ "$PATCH" = "1" ]); then
                    echo "⚠️  CVE-2025-55182: React $REACT_VERSION is vulnerable! Upgrade to 19.1.2 or later"
                    # exit 1 # Warn only
                  fi
                  if [ "$MAJOR" = "19" ] && [ "$MINOR" = "2" ] && [ "$PATCH" = "0" ]; then
                    echo "⚠️  CVE-2025-55182: React $REACT_VERSION is vulnerable! Upgrade to 19.2.1 or later"
                    # exit 1 # Warn only
                  fi
                fi

                # Check Next.js version in catalog
                NEXT_VERSION=$(grep '^\s*next:' pnpm-workspace.yaml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
                if [ -n "$NEXT_VERSION" ]; then
                  MAJOR=$(echo $NEXT_VERSION | cut -d. -f1)
                  MINOR=$(echo $NEXT_VERSION | cut -d. -f2)
                  PATCH=$(echo $NEXT_VERSION | cut -d. -f3)

                  # Vulnerable: 15.x < 15.5.7, 16.0.0-16.0.6
                  if [ "$MAJOR" = "15" ]; then
                    if [ "$MINOR" -lt 5 ] || ([ "$MINOR" = "5" ] && [ "$PATCH" -lt 7 ]); then
                      echo "⚠️  CVE-2025-66478: Next.js $NEXT_VERSION is vulnerable! Upgrade to 15.5.7 or later"
                      # exit 1 # Warn only
                    fi
                  fi
                  if [ "$MAJOR" = "16" ] && [ "$MINOR" = "0" ] && [ "$PATCH" -lt 7 ]; then
                    echo "⚠️  CVE-2025-66478: Next.js $NEXT_VERSION is vulnerable! Upgrade to 16.0.7 or later"
                    # exit 1 # Warn only
                  fi
                fi

                echo "✅ React and Next.js versions checked (warnings only)"
                echo "📋 Reference: .qoder/rules/always-react-security-boundaries.md"

        # Type check only affected packages (10x faster than checking all)
        # Note: Excludes web package (has 320+ pre-existing type errors)
        # Note: Excludes api-service package (has architectural type errors requiring larger refactor)
        type-check-affected:
            run: pnpm turbo type-check --filter="[HEAD^]..." --filter="!@snapback/web"

        # Run unit tests on affected packages (catch bugs before CI)
        # Note: Only runs if packages have "test" script in package.json
        test-affected:
            run: pnpm turbo test --filter=[HEAD^] || true

        # Lint affected packages
        lint-affected:
            run: pnpm turbo lint --filter=[HEAD^]

        # Format check for affected files
        format-affected:
            run: pnpm exec biome check --changed --since=HEAD^ --files-ignore-unknown=true --no-errors-on-unmatched

        # Check package versions to ensure catalog usage
        # Re-enabled after fix: Use list-mismatches to detect version drift
        check-package-versions:
            tags: [dependencies]
            glob: "packages/**/package.json"
            run: |
                if command -v pnpm &> /dev/null; then
                  echo "🔍 Checking package version consistency..."
                  # Run syncpack on changed files only
                  CHANGED_PACKAGES=$(git diff --cached --name-only | grep 'package.json$' || true)
                  if [ -n "$CHANGED_PACKAGES" ]; then
                    # Syncpack: Detect dependencies with version mismatches
                    MISMATCHES=$(pnpm syncpack list-mismatches 2>&1 | grep -c "error" || true)
                    if [ "$MISMATCHES" -eq 0 ]; then
                      echo "✅ Package versions consistent (using catalog: and workspace:*)"
                    else
                      echo "⚠️  Version mismatches detected:"
                      pnpm syncpack list-mismatches 2>&1 | head -10
                      echo ""
                      echo "   To fix: pnpm syncpack fix-mismatches"
                      # Don't fail on old packages - just warn
                    fi
                  fi
                fi

        # API-First Boundary Guard: Prevent direct DB access in apps/web
        # Enforces architectural boundary between web and database layers
        api-boundary-guard:
            tags: [architecture, api-first]
            run: bash scripts/check-api-boundary.sh

        # MCP Server: Build smoke tests (fast validation)
        # Catches: missing dependencies, TypeScript errors, module resolution
        mcp-server-smoke:
            tags: [smoke, mcp]
            glob: "apps/mcp-server/**/*.{ts,json}"
            run: |
                # Only run if MCP server files changed
                MCP_FILES=$(git diff --cached --name-only | grep "^apps/mcp-server/" | grep -v "\.test\." | grep -v "\.spec\." | grep -v "/test/" | grep -v "__tests__" || true)
                if [ -n "$MCP_FILES" ]; then
                  echo "🔍 Running MCP server smoke tests..."
                  pnpm --filter @snapback/mcp-server test test/smoke --run
                fi

        # MCP Server: Storage E2E tests (real persistence validation)
        # Catches: mock storage, broken FileSystemStorage, event bus failures
        mcp-server-e2e:
            tags: [e2e, mcp]
            glob: "apps/mcp-server/**/*.{ts,json}"
            run: |
                # Only run if MCP server files changed
                MCP_FILES=$(git diff --cached --name-only | grep "^apps/mcp-server/" | grep -v "\.test\." | grep -v "\.spec\." | grep -v "/test/" | grep -v "__tests__" || true)
                if [ -n "$MCP_FILES" ]; then
                  echo "🧪 Running MCP server E2E tests..."
                  pnpm --filter @snapback/mcp-server test test/e2e --run
                fi

        # VS Code Extension: Security dependency check
        # Catches: high-risk packages, CVEs, license issues, deprecated packages
        vscode-security-check:
            tags: [security, vscode]
            glob: "apps/vscode/package.json"
            run: |
                VSCODE_FILES=$(git diff --cached --name-only | grep "^apps/vscode/package.json" || true)
                if [ -n "$VSCODE_FILES" ]; then
                  echo "🔒 Running VS Code extension security checks..."
                  pnpm --filter snapback-vscode run security:check-deps
                fi

        # Guardian Detection Engine: Pattern detection tests (key differentiator)
        # Catches: Secret detection, mock leakage, phantom dependency issues
        # Runs comprehensive test suite including performance benchmarks
        detect-patterns:
            tags: [detection, guardian, quality]
            glob: "packages/core/src/detection/**/*.ts"
            run: |
                DETECTION_FILES=$(git diff --cached --name-only | grep "^packages/core/src/detection/" || true)
                if [ -n "$DETECTION_FILES" ]; then
                  echo "🔍 Running Guardian detection engine tests..."
                  pnpm run test -- "packages/core/test/detection/**/*.test.ts" --run
                fi
