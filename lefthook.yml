# SnapBack Pre-commit Hooks
# Prevents TypeScript errors and other issues from being committed
#
# Install: pnpm prepare (runs automatically on pnpm install)
# Skip hooks: LEFTHOOK=0 git commit -m "message"

pre-commit:
    parallel: true
    commands:
        # Type-check affected packages only (fast)
        type-check:
            glob: "*.{ts,tsx}"
            run: |
                echo "🔍 Running type-check on affected packages..."
                pnpm turbo run type-check --filter='...[HEAD^]' --output-logs=errors-only 2>/dev/null || \
                pnpm turbo run type-check --filter='@snapback/*' --output-logs=errors-only
            stage_fixed: true

        # Lint staged files with Biome
        lint:
            glob: "*.{ts,tsx,js,jsx,json}"
            exclude: "packages/config/src/safeguards/rollback.ts|packages/engine/src/runtime/storage.ts|apps/vscode/src/cli/CliLinkManager.ts|apps/vscode/src/config/ConfigLock.ts|apps/vscode/src/session/SessionRecovery.ts"
            run: pnpm biome check --no-errors-on-unmatched {staged_files}
            stage_fixed: true

        # Check for console.log in production code (not tests)
        # Disabled temporarily - pre-existing console.log statements need cleanup
        # no-console:
        #   glob: "*.{ts,tsx}"
        #   exclude: "*.test.{ts,tsx}|*.spec.{ts,tsx}|**/test/**|**/__tests__/**"
        #   run: |
        #     if grep -l "console\.log" {staged_files} 2>/dev/null; then
        #       echo "❌ Found console.log in staged files. Remove before committing."
        #       exit 1
        #     fi

commit-msg:
    commands:
        # Validate commit message format (conventional commits)
        commitlint:
            run: pnpm commitlint --edit {1}

pre-push:
    commands:
        # Full type-check before pushing
        type-check-full:
            run: |
                echo "🔍 Running full type-check before push..."
                pnpm turbo run type-check --filter='@snapback/*' --output-logs=errors-only
