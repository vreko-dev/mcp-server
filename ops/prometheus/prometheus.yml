# Prometheus configuration for SnapBack development environment
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # No rules yet
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape API service metrics
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape MCP service metrics
  - job_name: 'mcp'
    static_configs:
      - targets: ['mcp:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s
