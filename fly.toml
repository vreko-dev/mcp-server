# fly.toml app configuration file for snapback-mcp
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Deploy from monorepo root with:
# fly deploy . --config apps/mcp-server/fly.toml --dockerfile apps/mcp-server/Dockerfile

app = 'snapback-mcp'
primary_region = 'ord'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  # NOTE: Dockerfile path must be specified via --dockerfile flag when deploying from monorepo root
  # This avoids path resolution issues with relative paths in fly.toml
  [build.args]
    NODE_ENV = 'production'

[env]
  MCP_VERSION = '2.0.0'
  NODE_ENV = 'production'
  PORT = '8080'

# HTTP service configuration (replaces deprecated [[services]] syntax)
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 250

  # Health check configuration
  [[http_service.checks]]
    grace_period = '10s'
    interval = '15s'
    timeout = '3s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
