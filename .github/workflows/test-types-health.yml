name: Test Types Health (Non-Blocking)

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
        paths:
            - "apps/web/tests/**"
            - "apps/web/__tests__/**"
            - "packages/**/tests/**"
            - "packages/**/__tests__/**"
            - "**/*.test.ts"
            - "**/*.test.tsx"
            - "**/*.spec.ts"
            - "**/*.spec.tsx"

concurrency:
    group: test-types-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-types:
        name: Test Type Health Check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        continue-on-error: true # Non-blocking

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build for type references
              run: pnpm build

            - name: Create temp tsconfig for tests
              run: |
                  cat > apps/web/tsconfig.tests.json << 'EOF'
                  {
                    "extends": "./tsconfig.json",
                    "include": [
                      "tests/**/*",
                      "__tests__/**/*"
                    ],
                    "exclude": ["node_modules", "dist", ".next"]
                  }
                  EOF

            - name: Type check tests (non-blocking)
              id: typecheck
              run: |
                  cd apps/web
                  # Count errors but don't fail
                  set +e
                  OUTPUT=$(npx tsc -p tsconfig.tests.json --noEmit 2>&1)
                  ERROR_COUNT=$(echo "$OUTPUT" | grep -c "error TS" || echo "0")
                  echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
                  echo "$OUTPUT"
                  echo ""
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "📊 Test Type Errors: $ERROR_COUNT"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            - name: Post Summary
              run: |
                  echo "## 📊 Test Type Health" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  ERROR_COUNT="${{ steps.typecheck.outputs.error_count }}"
                  if [ "$ERROR_COUNT" = "0" ]; then
                    echo "✅ **All test types pass!**" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "You can now remove tests from tsconfig.json exclude list." >> $GITHUB_STEP_SUMMARY
                  else
                    echo "⚠️ **$ERROR_COUNT type error(s) in test files**" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "This is informational only - does not block PRs." >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
                    echo "- Fix test type errors incrementally" >> $GITHUB_STEP_SUMMARY
                    echo "- When at 0 errors, remove tests from tsconfig exclude" >> $GITHUB_STEP_SUMMARY
                  fi
