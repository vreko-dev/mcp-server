name: VS Code Extension - Performance Tracking

on:
    workflow_call:
    schedule:
        - cron: "0 2 * * *"
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - "apps/vscode/src/**"
            - "apps/vscode/test/performance/**"
            - ".github/workflows/vscode-performance.yml"

jobs:
    performance-benchmark:
        name: Performance Benchmarks
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Toolchain setup
              uses: ./.github/actions/setup-pnpm
              with:
                  pnpm-version: "10.14.0"
                  node-version: "20.x"
                  install: "false"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build dependencies
              run: |
                  pnpm --filter @snapback/contracts build
                  pnpm --filter @snapback/core build
                  pnpm --filter @snapback/storage build
                  pnpm --filter @snapback/telemetry build

            - name: Build extension
              run: pnpm --filter ./apps/vscode run compile

            - name: Run performance benchmarks
              id: benchmark
              run: |
                  pnpm --filter ./apps/vscode run test:performance > performance-results.txt 2>&1
                  echo "performance_complete=true" >> $GITHUB_OUTPUT
              continue-on-error: true

            - name: Extract performance metrics
              id: metrics
              if: steps.benchmark.outputs.performance_complete == 'true'
              run: |
                  # Extract key metrics from test output
                  # This will be customized based on actual test output format
                  echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
                  echo "git_sha=${{ github.sha }}" >> $GITHUB_OUTPUT

            - name: Download baseline metrics
              id: baseline
              uses: actions/cache@v4
              with:
                  path: performance-baseline.json
                  key: performance-baseline-${{ github.ref_name }}
                  restore-keys: |
                      performance-baseline-main
                      performance-baseline-

            - name: Compare with baseline
              id: compare
              if: steps.benchmark.outputs.performance_complete == 'true'
              run: |
                  # Create performance comparison script
                  cat > compare-performance.js << 'EOF'
                  const fs = require('fs');

                  // Read current results
                  const currentResults = fs.readFileSync('performance-results.txt', 'utf8');

                  // Read baseline if exists
                  let baseline = null;
                  if (fs.existsSync('performance-baseline.json')) {
                    baseline = JSON.parse(fs.readFileSync('performance-baseline.json', 'utf8'));
                  }

                  // Parse current metrics (simplified - actual parsing depends on test output)
                  const metrics = {
                    timestamp: new Date().toISOString(),
                    sha: process.env.GITHUB_SHA,
                    results: currentResults,
                  };

                  // Save current as new baseline
                  fs.writeFileSync('performance-baseline.json', JSON.stringify(metrics, null, 2));

                  // Calculate degradation if baseline exists
                  if (baseline) {
                    // This is a placeholder - actual comparison logic depends on metrics format
                    console.log('Baseline comparison:');
                    console.log('Previous run:', baseline.timestamp);
                    console.log('Current run:', metrics.timestamp);

                    // Set degradation flag if performance worsens by >20%
                    // Actual implementation would parse and compare specific metrics
                    process.env.DEGRADATION = 'false';
                  }

                  console.log('\nPerformance metrics saved to performance-baseline.json');
                  EOF

                  node compare-performance.js
                  echo "comparison_complete=true" >> $GITHUB_OUTPUT

            - name: Save performance baseline
              if: steps.compare.outputs.comparison_complete == 'true'
              uses: actions/cache@v4
              with:
                  path: performance-baseline.json
                  key: performance-baseline-${{ github.ref_name }}-${{ github.sha }}

            - name: Upload performance results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: performance-results-${{ github.sha }}
                  path: |
                      performance-results.txt
                      performance-baseline.json
                  retention-days: 90

            - name: Check for performance regression
              if: steps.benchmark.outputs.performance_complete == 'true'
              run: |
                  # Check if degradation flag is set
                  if [ -f .performance-degradation ]; then
                    echo "⚠️ Performance degradation detected (>20% slower than baseline)"
                    echo "Review the performance results artifact for details"
                    exit 1
                  else
                    echo "✅ Performance is within acceptable range"
                  fi

            - name: Comment on PR with results
              if: github.event_name == 'pull_request' && steps.benchmark.outputs.performance_complete == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const results = fs.readFileSync('performance-results.txt', 'utf8');

                      const body = `## ⚡ Performance Benchmark Results

                      **Status**: ${{ steps.benchmark.outcome == 'success' ? '✅ PASS' : '⚠️ WARNING' }}
                      **Commit**: \`${{ github.sha }}\`
                      **Run**: ${{ github.run_number }}

                      <details>
                      <summary>View detailed results</summary>

                      \`\`\`
                      ${results.slice(0, 2000)}
                      \`\`\`

                      </details>

                      [View full results artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
                      `;

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: body
                      });

    performance-summary:
        name: Performance Summary
        runs-on: ubuntu-latest
        needs: performance-benchmark
        if: always()

        steps:
            - name: Generate summary
              run: |
                  echo "## ⚡ Performance Tracking Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Date**: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
                  echo "**Benchmark Status**: ${{ needs.performance-benchmark.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if [ "${{ needs.performance-benchmark.result }}" == "success" ]; then
                    echo "✅ All performance benchmarks completed successfully" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "⚠️ Performance benchmarks completed with warnings or errors" >> $GITHUB_STEP_SUMMARY
                    echo "Review the artifacts for detailed results" >> $GITHUB_STEP_SUMMARY
                  fi
