name: Sync Public Packages

on:
    push:
        branches: [main]
        paths:
            - "packages/sdk/**"
            - "packages/core/**"
            - "apps/mcp-server/**"
            - "packages/contracts/**"
            - ".changeset/**"
    workflow_dispatch:

jobs:
    sync:
        name: Sync to Public Repository
        runs-on: ubuntu-latest
        if: github.repository == 'snapback-ai/snapback-private'

        steps:
            - name: Checkout private repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.PRIVATE_REPO_PAT }}

            - name: Setup Git
              run: |
                  git config user.name "SnapBack Bot"
                  git config user.email "bot@snapback.ai"

            - name: Clone public repository
              run: |
                  git clone https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/snapback-ai/snapback.git public-repo
                  cd public-repo
                  git config user.name "SnapBack Bot"
                  git config user.email "bot@snapback.ai"

            - name: Sync public packages
              run: |
                  echo "🔄 Syncing public packages to public repository..."

                  # Define public packages
                  PUBLIC_PACKAGES=(
                    "packages/sdk"
                    "packages/core"
                    "apps/mcp-server"
                    "packages/contracts"
                  )

                  # Sync each public package
                  for pkg in "${PUBLIC_PACKAGES[@]}"; do
                    echo "📦 Syncing $pkg..."

                    # Remove old version
                    rm -rf "public-repo/$pkg"

                    # Copy new version
                    mkdir -p "public-repo/$(dirname $pkg)"
                    cp -r "$pkg" "public-repo/$pkg"

                    # Remove .gitignore if present (we want to include dist/ in public repo)
                    rm -f "public-repo/$pkg/.gitignore"
                  done

                  # Sync root files
                  echo "📄 Syncing root files..."
                  cp README.md public-repo/ 2>/dev/null || true
                  cp LICENSE public-repo/ 2>/dev/null || true
                  cp CONTRIBUTING.md public-repo/ 2>/dev/null || true
                  cp .changeset/config.json public-repo/.changeset/ 2>/dev/null || true

                  # Sync workspace configuration
                  cp pnpm-workspace.yaml public-repo/
                  cp package.json public-repo/
                  cp turbo.json public-repo/
                  cp biome.json public-repo/

                  # Sync tooling
                  cp -r tooling public-repo/ 2>/dev/null || true

                  echo "✅ Sync complete!"

            - name: Create sync commit
              run: |
                  cd public-repo

                  # Check if there are changes
                  if [[ -n $(git status -s) ]]; then
                    git add .

                    # Use the commit message from the private repo
                    COMMIT_MSG=$(git log -1 --pretty=%B ${{ github.sha }} | head -n 1)

                    git commit -m "$COMMIT_MSG" -m "Synced from private repository" -m "Source commit: ${{ github.sha }}"

                    echo "📤 Pushing to public repository..."
                    git push origin main

                    echo "✅ Successfully synced to public repository!"
                  else
                    echo "ℹ️  No changes to sync"
                  fi

            - name: Verify sync
              run: |
                  cd public-repo

                  echo "🔍 Verifying public packages..."

                  # Verify all public packages exist
                  for pkg in packages/sdk packages/core apps/mcp-server packages/contracts; do
                    if [ ! -d "$pkg" ]; then
                      echo "❌ Missing package: $pkg"
                      exit 1
                    fi

                    if [ ! -f "$pkg/package.json" ]; then
                      echo "❌ Missing package.json in $pkg"
                      exit 1
                    fi

                    if [ ! -f "$pkg/LICENSE" ]; then
                      echo "❌ Missing LICENSE in $pkg"
                      exit 1
                    fi
                  done

                  echo "✅ All public packages verified!"

            - name: Check for private imports
              run: |
                  cd public-repo

                  echo "🔒 Checking for private package imports..."

                  # Check for imports of private packages
                  VIOLATIONS=$(find packages apps -name "*.ts" -o -name "*.tsx" | \
                    xargs grep -l "from ['\"]@snapback/\(logs\|api\|web\|auth\|database\|mail\|payments\|analytics\|storage\|telemetry\)" 2>/dev/null || true)

                  if [ -n "$VIOLATIONS" ]; then
                    echo "❌ Private package imports detected in public repository!"
                    echo "$VIOLATIONS"
                    exit 1
                  fi

                  echo "✅ No private imports detected!"

            - name: Notify on failure
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: '⚠️ Public Repository Sync Failed',
                        body: `
                          The automated sync to the public repository failed.

                          **Workflow Run:** ${context.payload.repository.html_url}/actions/runs/${context.runId}
                          **Commit:** ${context.sha}

                          Please review the workflow logs and fix any issues.
                        `,
                        labels: ['automation', 'priority-high']
                      })
