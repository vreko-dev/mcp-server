name: E2E Tests

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main]

jobs:
    e2e-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Start Docker services
              run: |
                  docker-compose --env-file .env.docker -f docker-compose.dev.yml up -d
                  echo "Waiting for services to start..."
                  sleep 30

            - name: Wait for services to be healthy
              run: |
                  # Wait for PostgreSQL to be ready
                  timeout 60 bash -c 'until docker-compose --env-file .env.docker -f docker-compose.dev.yml exec postgres pg_isready -U snapback; do sleep 2; done'
                  # Wait for Redis to be ready
                  timeout 30 bash -c 'until docker-compose --env-file .env.docker -f docker-compose.dev.yml exec redis redis-cli ping; do sleep 2; done'
                  # Additional wait for services to fully initialize
                  sleep 10

            - name: Install Playwright browsers
              run: npx playwright install --with-deps

            - name: Run E2E tests
              run: npx playwright test --reporter=github,junit,line

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      test-results/
                      playwright-report/
                  if-no-files-found: ignore

            - name: Cleanup Docker
              if: always()
              run: docker-compose --env-file .env.docker -f docker-compose.dev.yml down -v
