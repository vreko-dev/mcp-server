import { z } from 'zod';
const Args=z.object({ dry: z.boolean().default(true), limit: z.coerce.number().default(100), since: z.string().optional() });
const argv=process.argv.slice(2); const opts:any={}; for(let i=0;i<argv.length;i++){ const a=argv[i]; if(a==='--no-dry') opts.dry=false; if(a==='--dry') opts.dry=true; if(a==='--limit') opts.limit=Number(argv[++i]); if(a==='--since') opts.since=argv[++i]; }
const args=Args.parse({ dry:true, limit:100, ...opts });
async function main(){
  // NOTE: wire to your DB adapter; pseudo implementation:
  console.log(`Replaying from quarantine_events ${args.dry?'(dry-run)':''} limit=${args.limit} since=${args.since||'all'}`);
  // fetch rows ordered by created_at asc; if args.since provided, filter
  // for each row: attempt normal ingest; on success, delete from quarantine
}
main().catch(e=>{ console.error(e); process.exit(1); });
