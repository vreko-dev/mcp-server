name: Chromatic Visual Regression

on:
  push:
    branches:
      - main
      - test-stabilization/**
  pull_request:
    branches:
      - main

# Only run one workflow at a time per PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Chromatic to track changes

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @snapback/web^... build

      - name: Build Storybook
        run: pnpm --filter @snapback/web storybook:build

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: 'storybook:build'
          workingDir: apps/web
          exitZeroOnChanges: true # Don't fail CI on visual changes
          exitOnceUploaded: true # Exit immediately after upload
          onlyChanged: true # Only test changed stories (faster)
          autoAcceptChanges: 'main' # Auto-accept on main branch

      - name: Comment PR with Chromatic results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Chromatic')
            );

            const output = `### 🎨 Chromatic Visual Regression

            **Build:** ${{ steps.chromatic.outputs.buildUrl }}
            **Storybook:** ${{ steps.chromatic.outputs.storybookUrl }}

            Changes detected: **${{ steps.chromatic.outputs.changeCount }}**
            `;

            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }
