- id: docs-runbooks
  desc: "Update RUNBOOKS with replay procedure and thresholds"
  run: |
    mkdir -p docs
    cat > docs/RUNBOOKS.md <<'MD'
# RUNBOOKS

## Telemetry Insert Failures
1) Check logs for `telemetry-insert-failed`.
2) Inspect `quarantine_events` (payload + error).
3) Fix redaction/parsing, then:
   - Dry run: `pnpm quarantine:replay`
   - Live: `pnpm quarantine:replay --no-dry --limit 500`

## Slow Queries
- Threshold: **200ms** per insert (SLOW_MS).
- Capture plan: run EXPLAIN; add composite indexes on `(user_id, created_at)` or `(api_key_id, created_at)`.

## GDPR — Data Erasure
- Delete user row; child telemetry rows cascade (FK ON DELETE CASCADE).
- Verify: user absent; telemetry + quarantine rows removed.
MD
