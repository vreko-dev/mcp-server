# Holistic Development Docker Compose Configuration
# ALL services running together for comprehensive platform debugging
# Includes: Web, API, MCP, CLI, Docs, Database, Cache, Email, Monitoring, Tracing
#
# Usage:
#   docker-compose -f docker-compose.holistic.yml up
#   docker-compose -f docker-compose.holistic.yml logs -f
#   docker-compose -f docker-compose.holistic.yml exec api bash
#
# Access Points:
#   🌐 Web UI:      http://snapback.dev:3000
#   🎛️  Console:     http://console.snapback.dev:3000
#   📚 Docs:        http://docs.snapback.dev:3000
#   🔌 API:         http://api.snapback.dev:8080
#   🤖 MCP:         http://mcp.snapback.dev:8081
#   📱 CLI:         Via docker-compose exec cli
#   🗄️  Postgres:    localhost:5432
#   📦 Redis:       localhost:6379
#   📧 Mailhog:     http://localhost:8025
#   📊 Prometheus:  http://localhost:9090
#   📈 Grafana:     http://localhost:3002
#   🔍 Jaeger:      http://localhost:16686

services:
  # ===== DATABASE =====
  postgres:
    image: postgres:16-alpine
    container_name: snapback-postgres
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Memory optimization for development
      POSTGRES_INITDB_ARGS: "-c shared_buffers=128MB -c effective_cache_size=256MB -c maintenance_work_mem=32MB -c work_mem=8MB -c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/platform/drizzle/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - snapback
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped

  # ===== REDIS CACHE =====
  redis:
    image: redis:7-alpine
    container_name: snapback-redis
    command: redis-server --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - snapback
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ===== DATABASE MIGRATIONS =====
  migrations:
    image: postgres:16-alpine
    container_name: snapback-migrations
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./packages/platform/drizzle/migrations:/migrations:ro
      - ./ops/scripts/run-migrations.sh:/run-migrations.sh:ro
    command: sh /run-migrations.sh
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snapback
    restart: "no"

  # ===== API SERVICE (Hono) =====
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: snapback-api
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://api.snapback.dev:8080
      CORS_ORIGIN: http://snapback.dev:3000,http://console.snapback.dev:3000,http://docs.snapback.dev:3000,http://mcp.snapback.dev:8081
      LOG_LEVEL: debug
      # Sentry error tracking (non-production)
      SENTRY_DSN: ${SENTRY_DSN:-}
      DISABLE_SENTRY: ${DISABLE_SENTRY:-false}
      # Monitoring & Tracing
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      JAEGER_SAMPLER_TYPE: const
      JAEGER_SAMPLER_PARAM: 1
    ports:
      - "8080:8080" # API service
      - "9230:9230" # Node debugger
    volumes:
      - ./apps/api/src:/app/apps/api/src:cached
      - ./packages:/app/packages:cached
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - snapback
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===== MCP SERVER =====
  mcp:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile.dev
    container_name: snapback-mcp
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      NODE_ENV: development
      PORT: 8081
      API_URL: http://api:8080
      MCP_PUBLIC_URL: http://mcp.snapback.dev:8081
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BETTER_AUTH_URL: http://api.snapback.dev:8080
      LOG_LEVEL: debug
      # Sentry error tracking (non-production)
      SENTRY_DSN: ${SENTRY_DSN:-}
      DISABLE_SENTRY: ${DISABLE_SENTRY:-false}
      # Monitoring & Tracing
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      JAEGER_SAMPLER_TYPE: const
      JAEGER_SAMPLER_PARAM: 1
    ports:
      - "8081:8081" # MCP service
      - "9231:9231" # Node debugger
    volumes:
      - ./apps/mcp-server/src:/app/apps/mcp-server/src:cached
      - ./packages:/app/packages:cached
      - /app/node_modules
      - /app/apps/mcp-server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - snapback
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===== WEB APPLICATION (Next.js) =====
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: snapback-web
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

      # Client-side URLs
      NEXT_PUBLIC_API_URL: http://api.snapback.dev:8080
      NEXT_PUBLIC_MCP_URL: http://mcp.snapback.dev:8081
      NEXT_PUBLIC_APP_URL: http://console.snapback.dev:3000
      NEXT_PUBLIC_SITE_URL: http://snapback.dev:3000
      NEXT_PUBLIC_ROOT_DOMAIN: snapback.dev

      # Server-side URLs (Docker network)
      API_URL: http://api:8080
      MCP_URL: http://mcp:8081
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      # Auth
      BETTER_AUTH_URL: http://api.snapback.dev:8080
      COOKIE_DOMAIN: .snapback.dev
    ports:
      - "3000:3000" # Web app
      - "9229:9229" # Node debugger
    volumes:
      - ./apps/web:/app/apps/web:cached
      - ./packages:/app/packages:cached
      - /app/apps/web/.next
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy
    networks:
      - snapback
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ===== DOCS (Next.js) =====
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile.dev
    container_name: snapback-docs
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_SITE_URL: http://snapback.dev:3000
      NEXT_PUBLIC_ROOT_DOMAIN: snapback.dev
    ports:
      - "3001:3000" # Docs app
      - "9232:9229" # Node debugger
    volumes:
      - ./apps/docs:/app/apps/docs:cached
      - ./packages:/app/packages:cached
      - /app/apps/docs/.next
      - /app/node_modules
      - /app/apps/docs/node_modules
    networks:
      - snapback
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ===== CLI (Node.js development) =====
  cli:
    build:
      context: .
      dockerfile: apps/cli/Dockerfile.dev
    container_name: snapback-cli
    env_file:
      - .env.docker
      - .env.docker.local
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    ports:
      - "8082:8082" # CLI service (if applicable)
      - "9233:9233" # Node debugger
    volumes:
      - ./apps/cli/src:/app/apps/cli/src:cached
      - ./packages:/app/packages:cached
      - /app/node_modules
      - /app/apps/cli/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - snapback
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ===== MAILHOG (Email Testing) =====
  mailhog:
    image: mailhog/mailhog:latest
    container_name: snapback-mailhog
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - snapback
    restart: unless-stopped

  # ===== NGINX (Reverse Proxy for Subdomains) =====
  nginx:
    image: nginx:alpine
    container_name: snapback-nginx
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - docs
      - mcp
    networks:
      - snapback
    restart: unless-stopped

  # ===== PROMETHEUS (Metrics Collection) =====
  prometheus:
    image: prom/prometheus:latest
    container_name: snapback-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"
      - "--web.enable-lifecycle"
    networks:
      - snapback
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===== GRAFANA (Metrics Visualization) =====
  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: snapback-grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - snapback
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===== JAEGER (Distributed Tracing) =====
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: snapback-jaeger
    ports:
      - "16686:16686" # UI
      - "14268:14268" # Accepts Zipkin spans
      - "6831:6831/udp" # Accepts Jaeger spans
    networks:
      - snapback
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===== Redis Insight (Redis GUI) =====
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: snapback-redis-insight
    ports:
      - "8001:8001"
    volumes:
      - redis-insight-data:/db
    networks:
      - snapback
    restart: unless-stopped
    environment:
      RISERVER_PORT: 8001

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  redis-insight-data:

networks:
  snapback:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
