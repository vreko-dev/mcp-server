pre-commit:
  parallel: false
  commands:
    quality:
      glob: "**/*.{ts,tsx,js,jsx,json}"
      run: |
        echo '🔍 Running Biome checks (no auto-fix)...'
        pnpm biome check --staged --no-errors-on-unmatched
        if [ $? -ne 0 ]; then
          echo '❌ Biome check failed. Run pnpm biome check --write to auto-fix, then stage changes.'
          exit 1
        fi
        echo '✅ Biome checks passed'
      skip:
        - merge
        - rebase

    unused-variables-check:
      glob: "**/*.{ts,tsx}"
      run: |
        echo '🔍 Checking for actual unused variables (not prefixed with _)...'
        VIOLATIONS=0
        for file in {staged_files}; do
          # Find patterns like: const x = ...; or let x = ...; without underscore prefix
          # that are not followed by usage in the same scope
          if grep -E '(const|let)\s+[a-zA-Z][a-zA-Z0-9]*\s*=' "$file" | grep -qv '_[a-zA-Z]'; then
            # This is a heuristic check - actual unused variables are caught by TypeScript
            # This script serves as a reminder layer
            :
          fi
        done
        echo '✅ Unused variable check passed (TypeScript will catch actual violations)'
      skip:
        - merge
        - rebase

    type-check-strict:
      glob: "**/*.{ts,tsx}"
      run: |
        echo '📋 Running strict TypeScript type-check...'
        pnpm turbo run type-check --no-cache
        if [ $? -ne 0 ]; then
          echo '❌ TypeScript type-check failed. Fix type errors before committing.'
          exit 1
        fi
        echo '✅ TypeScript type-check passed'
      skip:
        - merge
        - rebase

    workspace-deps-validation:
      glob: "**/package.json"
      run: |
        echo '🔗 Validating workspace dependencies..'
        node - << 'EOF'
        const fs = require('fs');
        const path = require('path');
        const files = process.argv.slice(1);
        let hasErrors = false;

        files.forEach(file => {
          try {
            const content = JSON.parse(fs.readFileSync(file, 'utf8'));
            const deps = { ...content.dependencies, ...content.devDependencies };
            
            // Check for internal packages that should use workspace:*
            Object.entries(deps).forEach(([pkg, version]) => {
              if (pkg.startsWith('@snapback/') && !version.includes('workspace')) {
                console.error(`❌ ${file}: "${pkg}" should be "workspace:*" not "${version}"`);
                hasErrors = true;
              }
            });
          } catch (e) {
            console.error(`Failed to parse ${file}: ${e.message}`);
            hasErrors = true;
          }
        });

        process.exit(hasErrors ? 1 : 0);
        EOF
      skip:
        - merge
        - rebase

    no-placeholder-tests:
      glob: "**/*.test.ts"
      run: |
        echo '🔍 Checking for placeholder assertions...'
        if grep -l 'expect(true).toBe(true)' {staged_files} 2>/dev/null; then
          echo '❌ Placeholder test detected. Implement real assertions.'
          exit 1
        fi
        echo '✅ No placeholder assertions found'

    no-skipped-tests:
      glob: "**/*.test.ts"
      run: |
        echo '⚠️  Checking for skipped tests...'
        if grep -l 'it.skip\|describe.skip\|test.skip' {staged_files} 2>/dev/null; then
          echo '⚠️  Skipped test detected. Add unblock criteria in comment or implement.'
        fi

    no-todo-tests:
      glob: "**/*.test.ts"
      stage_fixed: true
      run: |
        echo '🔍 Checking for TODO markers in tests...'
        if grep -l '// TODO:' {staged_files} 2>/dev/null; then
          echo '⚠️  TODO marker found. Consider moving to __deferred__/ if test is blocked.'
        fi

commit-msg:
  commands:
    test-commit-format:
      run: |
        echo '📝 Validating commit message format...'
        if grep -qE '(WIP|TODO|FIXME|XXX|HACK)' <<< "$1"; then
          echo '⚠️  Commit message contains work-in-progress marker'
        fi
        echo '✅ Commit message format OK'

post-checkout:
  commands:
    install-deps:
      run: |
        if git diff HEAD@{1} HEAD --name-only | grep -q pnpm-lock.yaml; then
          echo '📦 pnpm-lock.yaml changed, installing dependencies...'
          pnpm install --frozen-lockfile
        fi

post-merge:
  commands:
    install-deps:
      run: |
        if git diff HEAD@{1} HEAD --name-only | grep -q pnpm-lock.yaml; then
          echo '📦 pnpm-lock.yaml merged, installing dependencies...'
          pnpm install --frozen-lockfile
        fi
