- id: analytics-filters
  desc: "Add filter builder and wire reads.ts (non-destructive)"
  run: |
    mkdir -p packages/analytics/src/query
    [ -f packages/analytics/src/query/filters.ts ] || cat > packages/analytics/src/query/filters.ts <<'TS'
export type Where = Array<{ sql: string; params?: any[] }>;
export function buildFilters(opts: Record<string,unknown>): Where {
  const where: Where = []; const add=(sql:string,...params:any[])=>where.push({sql,params});
  if (opts.userId) add(`user_id = $1`, String(opts.userId));
  if (opts.apiKeyId) add(`api_key_id = $1`, String(opts.apiKeyId));
  if (opts.from) add(`created_at >= $1`, new Date(String(opts.from)).toISOString());
  if (opts.to) add(`created_at < $1`, new Date(String(opts.to)).toISOString());
  if (opts.type) add(`type = $1`, String(opts.type));
  return where;
}
TS
    node - <<'NODE'
const fs=require('fs'); const p='packages/analytics/src/reads.ts'; if(!fs.existsSync(p)) process.exit(0);
let s=fs.readFileSync(p,'utf8'); let ch=false;
if(!/buildFilters/.test(s)){ s=`import { buildFilters } from './query/filters.js';\n`+s; ch=true; }
if(!/applyFilters\(/.test(s)){
  s+=`
function applyFilters(base:string, filters: ReturnType<typeof buildFilters>){
  if(!filters.length) return { sql: base, params: [] as any[] };
  const clauses = filters.map((f,i)=>f.sql.replace('$1', '$'+(i+1)));
  const params = filters.map(f=>f.params?.[0]);
  return { sql: base + ' WHERE ' + clauses.join(' AND '), params };
}
`; ch=true;
}
if(ch){fs.writeFileSync(p,s); console.log('reads.ts wired');}
NODE
    git add packages/analytics/src/query/filters.ts packages/analytics/src/reads.ts
    git commit -m "analytics: dynamic filters + helper wiring" || true

- id: retention-clock
