name: 'SnapBack Guardian'
description: 'Run Guardian on PR diff; comment findings; fail check on criticals (offline fixtures in tests)'
author: 'SnapBack'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  fail-on-critical:
    description: 'Fail the check if critical findings are detected'
    required: false
    default: 'true'

runs:
  using: 'node16'
  main: 'index.js'

branding:
  icon: 'shield'
  color: 'blue'