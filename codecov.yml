# Codecov Configuration for SnapBack Monorepo
# See: https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%  # Allow 1% drop without failing
      sdk:
        target: 80%
        flags:
          - sdk
      contracts:
        target: 90%  # Higher standard for type contracts
        flags:
          - contracts
      mcp-server:
        target: 75%
        flags:
          - mcp-server
      vscode:
        target: 70%
        flags:
          - vscode

flag_management:
  default_rules:
    carryforward: true  # Remember old coverage when only testing changed packages

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true  # Only comment if coverage changed

parsers:
  javascript:
    enable_partials: true
