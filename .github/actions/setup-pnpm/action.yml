name: Setup Node and PNPM
description: >
    Configure the Node.js toolchain, install PNPM, and optionally install dependencies
    for the SnapBack monorepo using a consistent set of versions and cache settings.
inputs:
    node-version:
        description: Node.js version to install
        required: false
        default: "20.x"
    pnpm-version:
        description: PNPM version to install
        required: false
        default: "10.14.0"
    working-directory:
        description: Directory in which to install dependencies
        required: false
        default: "."
    install:
        description: Whether to run pnpm install --frozen-lockfile
        required: false
        default: "true"
runs:
    using: composite
    steps:
        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
              node-version: ${{ inputs.node-version }}
              cache: pnpm
              cache-dependency-path: pnpm-lock.yaml

        - name: Set up PNPM
          uses: pnpm/action-setup@v4
          with:
              version: ${{ inputs.pnpm-version }}

        - name: Install dependencies
          if: ${{ inputs.install == 'true' }}
          shell: bash
          working-directory: ${{ inputs.working-directory }}
          run: pnpm install --frozen-lockfile
