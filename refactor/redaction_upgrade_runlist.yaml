const fs=require('fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.scripts=j.scripts||{};
j.scripts['db:assert']="tsx scripts/db-assert.ts";
fs.writeFileSync(p, JSON.stringify(j,null,2));
