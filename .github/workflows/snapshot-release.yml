name: Snapshot Release

on:
    push:
        branches:
            - beta

jobs:
    snapshot-release:
        name: Snapshot Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.12.0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install

            - name: Create Snapshot Release
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm snapshot
                  publish: pnpm release-snapshot
                  commit: "chore: update versions for snapshot release"
                  title: "chore: update versions for snapshot release"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
