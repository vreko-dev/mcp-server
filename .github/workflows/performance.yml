name: Performance Budget CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
  push:
    branches:
      - main
      - develop

jobs:
  web-performance:
    name: Web Performance Budget
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter=@snapback/web^...

      - name: Build web app
        run: pnpm --filter @snapback/web build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Analyze bundle size
        run: |
          echo "## Performance Budget Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if .next directory exists
          if [ ! -d "apps/web/.next" ]; then
            echo "❌ Build artifacts not found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Get bundle sizes
          BUNDLE_SIZE=$(du -sh apps/web/.next | cut -f1)
          echo "📦 **Total Bundle Size:** $BUNDLE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Find largest chunks
          echo "### Largest JavaScript Chunks" >> $GITHUB_STEP_SUMMARY
          find apps/web/.next/static/chunks -name "*.js" -type f -exec du -h {} + | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY || echo "No JS chunks found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check .next/standalone size (if exists)
          if [ -d "apps/web/.next/standalone" ]; then
            STANDALONE_SIZE=$(du -sh apps/web/.next/standalone | cut -f1)
            echo "🚀 **Standalone Size:** $STANDALONE_SIZE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check performance budgets
        run: |
          echo "### Performance Budget Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BUDGET_PASSED=true

          # Budget: Total .next size should be < 100MB
          NEXT_SIZE_MB=$(du -sm apps/web/.next | cut -f1)
          if [ "$NEXT_SIZE_MB" -gt 100 ]; then
            echo "❌ **FAILED:** Total .next size ($NEXT_SIZE_MB MB) exceeds budget (100 MB)" >> $GITHUB_STEP_SUMMARY
            BUDGET_PASSED=false
          else
            echo "✅ **PASSED:** Total .next size ($NEXT_SIZE_MB MB) within budget (100 MB)" >> $GITHUB_STEP_SUMMARY
          fi

          # Budget: Largest single JS chunk should be < 500KB
          LARGEST_CHUNK=$(find apps/web/.next/static/chunks -name "*.js" -type f -exec du -k {} + | sort -rn | head -1 | cut -f1)
          if [ -n "$LARGEST_CHUNK" ] && [ "$LARGEST_CHUNK" -gt 500 ]; then
            echo "❌ **FAILED:** Largest JS chunk ($LARGEST_CHUNK KB) exceeds budget (500 KB)" >> $GITHUB_STEP_SUMMARY
            BUDGET_PASSED=false
          else
            echo "✅ **PASSED:** Largest JS chunk ($LARGEST_CHUNK KB) within budget (500 KB)" >> $GITHUB_STEP_SUMMARY
          fi

          # Budget: Client-side JS total should be < 300KB (gzipped estimate: ~30% of uncompressed)
          CLIENT_JS_SIZE=$(find apps/web/.next/static/chunks -name "*.js" -type f -exec du -k {} + | awk '{sum+=$1} END {print sum}')
          if [ -n "$CLIENT_JS_SIZE" ] && [ "$CLIENT_JS_SIZE" -gt 1000 ]; then
            echo "⚠️ **WARNING:** Total client JS ($CLIENT_JS_SIZE KB) may exceed recommended size" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **PASSED:** Total client JS ($CLIENT_JS_SIZE KB) within recommended size" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$BUDGET_PASSED" = false ]; then
            echo "❌ Performance budget check failed!" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All performance budgets passed!" >> $GITHUB_STEP_SUMMARY
          fi

  api-performance:
    name: API Response Time Budget
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API package
        run: pnpm --filter @snapback/api build

      - name: Run API performance tests
        run: |
          echo "## API Performance Budget Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Response Time Budgets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ORPC procedures: < 200ms (p95)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Analytics queries: < 300ms (p95)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Session finalization: < 100ms (p95)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ Performance tests run via package test suites" >> $GITHUB_STEP_SUMMARY

  runtime-performance:
    name: Runtime Performance Budgets (Alpha Spec)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build perf package
        run: pnpm --filter @snapback/perf build

      - name: Run performance budget tests
        run: |
          echo "## Runtime Performance Budget Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Testing Alpha performance budgets:" >> $GITHUB_STEP_SUMMARY
          echo "- Snapshot creation: <100ms (p95, ±20% variance)" >> $GITHUB_STEP_SUMMARY
          echo "- Risk analysis: <500ms (±20% variance)" >> $GITHUB_STEP_SUMMARY
          echo "- Session tracking: <50ms (±20% variance)" >> $GITHUB_STEP_SUMMARY
          echo "- Analytics TTI: <2000ms (±20% variance)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          pnpm --filter @snapback/perf test
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All runtime performance budgets passed!" >> $GITHUB_STEP_SUMMARY
