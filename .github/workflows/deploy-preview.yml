name: Deploy Preview

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches: [main]
        paths:
            - "apps/web/**"
            - "apps/docs/**"
            - "packages/**"

concurrency:
    group: deploy-preview-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-web-preview:
        name: Deploy Web Preview
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment:
            name: preview
            url: ${{ steps.deploy.outputs.preview-url }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Pull Vercel Environment
              run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

            - name: Build for Preview
              run: vercel build
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

            - name: Deploy to Vercel
              id: deploy
              run: |
                  URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -Eo 'https://[^ ]+' | head -n1)
                  echo "preview-url=$URL" >> $GITHUB_OUTPUT
                  echo "Deployed to: $URL"
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

            - name: Comment PR
              uses: actions/github-script@v7
              if: steps.deploy.outputs.preview-url
              with:
                  script: |
                      github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                        body: '## 🚀 Preview Deployed\n\n**URL:** ${{ steps.deploy.outputs.preview-url }}\n\n**Environment:** Staging'
                      });
